<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Kapi Coast</title>
  <style>
    /* ── Brand palette ── */
    :root {
      --espresso:   #2C1A0E;
      --mocha:      #5C3D1E;
      --latte:      #C49A6C;
      --cream:      #F5EFE6;
      --foam:       #FDF8F2;
      --text-dark:  #1E1108;
      --text-mid:   #6B4F35;
      --text-light: #9E7A55;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header bar ── */
    header {
      width: 100%;
      background: var(--espresso);
      color: var(--cream);
      text-align: center;
      padding: 18px 16px 14px;
    }
    header h1 {
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    header p {
      font-size: 12px;
      letter-spacing: 1px;
      opacity: 0.7;
      margin-top: 2px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      background: var(--foam);
      width: 100%;
      max-width: 420px;
      border-radius: 0 0 16px 16px;
      padding: 28px 24px 32px;
      box-shadow: 0 6px 24px rgba(44,26,14,0.12);
    }

    /* ── Avatar + name ── */
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--mocha);
      color: var(--cream);
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
    .customer-name {
      font-size: 22px;
      color: var(--text-dark);
      text-align: center;
    }
    .customer-contact {
      font-size: 13px;
      color: var(--text-light);
      text-align: center;
      margin-top: 4px;
      font-family: Arial, sans-serif;
    }

    /* ── Loyalty badge ── */
    .loyalty-section {
      margin: 22px 0 18px;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 30px;
      padding: 7px 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .badge-first  { background: #FFF3CD; color: #7A5200; border: 1.5px solid #F0C040; }
    .badge-regular{ background: #E8F4E8; color: #2D6A2D; border: 1.5px solid #82C882; }
    .badge-vip    { background: var(--espresso); color: var(--latte);  border: 1.5px solid var(--latte); }

    .badge-sub {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 6px;
      font-family: Arial, sans-serif;
    }

    /* ── Stats grid ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-box {
      background: var(--cream);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid rgba(196,154,108,0.3);
    }
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: var(--mocha);
      font-family: Arial, sans-serif;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-family: Arial, sans-serif;
    }

    /* ── Detail rows ── */
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(196,154,108,0.2);
      font-family: Arial, sans-serif;
    }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-key {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
    }
    .detail-val {
      font-size: 14px;
      color: var(--text-dark);
      font-weight: bold;
      text-align: right;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid rgba(196,154,108,0.3);
      margin: 20px 0;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn {
      flex: 1;
      padding: 13px 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-menu {
      background: var(--espresso);
      color: var(--cream);
    }
    .btn-signout {
      background: transparent;
      color: var(--mocha);
      border: 1.5px solid var(--latte);
    }

    /* ── Loading state ── */
    #loading {
      padding: 60px 0;
      text-align: center;
      color: var(--text-light);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    #content { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Kapi Coast</h1>
  <p>My Profile</p>
</header>

<div class="card">
  <div id="loading">Loading your profile…</div>

  <div id="content">
    <div class="avatar" id="avatar">?</div>
    <div class="customer-name" id="name"></div>
    <div class="customer-contact" id="contact"></div>

    <div class="loyalty-section">
      <div class="badge" id="loyaltyBadge"></div>
      <div class="badge-sub" id="badgeSub"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="visitCount">—</div>
        <div class="stat-label">Total Visits</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="memberSince">—</div>
        <div class="stat-label">Member Since</div>
      </div>
    </div>

    <hr class="divider">

    <div class="detail-row">
      <span class="detail-key">Last Visit</span>
      <span class="detail-val" id="lastLogin">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-key">Login Via</span>
      <span class="detail-val" id="loginMethod">—</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-menu" onclick="window.location.href='/index.html'">View Menu</button>
      <button class="btn btn-signout" onclick="handleSignOut()">Sign Out</button>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

function formatDate(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
}

function formatMonthYear(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return d.toLocaleDateString("en-IN", { month: "short", year: "numeric" });
}

function loyaltyInfo(visits) {
  if (visits >= 6) return { label: "VIP", cls: "badge-vip",     sub: "You're part of the inner circle — thank you!" };
  if (visits >= 2) return { label: "Regular", cls: "badge-regular", sub: `${6 - visits} more visit${6 - visits > 1 ? "s" : ""} to unlock VIP status` };
  return              { label: "First Timer", cls: "badge-first",   sub: "Welcome to Kapi Coast! Come back for more." };
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  const snap = await getDoc(doc(db, "customers", user.uid));
  if (!snap.exists()) {
    window.location.href = "/login.html";
    return;
  }

  const d = snap.data();

  // Avatar initials
  const initials = (d.name || "?").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  document.getElementById("avatar").textContent = initials;

  // Name & contact
  document.getElementById("name").textContent = d.name || "Customer";
  const contact = [d.email, d.phone].filter(Boolean).join(" · ");
  document.getElementById("contact").textContent = contact || "";

  // Loyalty badge
  const { label, cls, sub } = loyaltyInfo(d.visits || 1);
  const badge = document.getElementById("loyaltyBadge");
  badge.textContent = label;
  badge.className = "badge " + cls;
  document.getElementById("badgeSub").textContent = sub;

  // Stats
  document.getElementById("visitCount").textContent = d.visits ?? "—";
  document.getElementById("memberSince").textContent = formatMonthYear(d.firstVisit);

  // Details
  document.getElementById("lastLogin").textContent   = formatDate(d.lastLogin);
  document.getElementById("loginMethod").textContent = d.loginMethod === "google" ? "Google" : d.loginMethod === "phone" ? "Phone / OTP" : (d.loginMethod || "—");

  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
});

window.handleSignOut = async function () {
  await signOut(auth);
  window.location.href = "/login.html";
};

</script>
</body>
</html>
