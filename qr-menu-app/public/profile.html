<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Kapi Coast</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', Arial, sans-serif;
      background: #FAF6F0;
      color: #2C1A0E;
      min-height: 100vh;
      padding-bottom: 48px;
      transition: background 0.25s, color 0.25s;
    }
    body.dark { background: #0D0D0D; color: #FAF6F0; }

    /* ─── HEADER ─── */
    .header {
      background: #2C1A0E;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }
    .header-back {
      color: #C8894A;
      font-size: 22px;
      text-decoration: none;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .header-back:hover { background: rgba(200,137,74,0.12); }
    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      font-weight: 700;
      color: #FAF6F0;
      letter-spacing: 0.5px;
    }
    .theme-btn {
      background: rgba(200,137,74,0.12);
      border: 1px solid rgba(200,137,74,0.3);
      border-radius: 20px;
      padding: 6px 13px;
      color: #C8894A;
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: rgba(200,137,74,0.2); }

    /* ─── PAGE WRAPPER ─── */
    .page { max-width: 440px; margin: 0 auto; padding: 0 16px; }

    /* ─── LOADING ─── */
    #loading {
      text-align: center;
      padding: 100px 20px;
      color: #9A7D6B;
      font-size: 15px;
      font-weight: 600;
    }
    #content { display: none; }

    /* ─── HERO ─── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 0 28px;
    }
    .avatar-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C8894A 0%, #a06330 100%);
      color: #fff;
      font-size: 34px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 28px rgba(200,137,74,0.38);
      border: 3px solid rgba(255,255,255,0.25);
    }
    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(200,137,74,0.3);
    }
    .hero-name {
      font-size: 24px;
      font-weight: 800;
      color: #2C1A0E;
      letter-spacing: -0.4px;
      margin-bottom: 5px;
      text-align: center;
    }
    body.dark .hero-name { color: #FAF6F0; }
    .hero-contact {
      font-size: 13px;
      color: #9A7D6B;
      font-weight: 500;
      margin-bottom: 14px;
      text-align: center;
    }
    /* Tier badge under name */
    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 18px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .tier-first   { background: #F3F4F6; color: #6B7280; }
    .tier-regular { background: #FEF3C7; color: #92400E; }
    .tier-vip     { background: #2C1A0E; color: #C8894A; border: 1px solid rgba(200,137,74,0.4); }
    body.dark .tier-first   { background: #222; color: #999; }
    body.dark .tier-regular { background: #3D2E00; color: #F59E0B; }

    /* ─── LOYALTY CARD ─── */
    .loyalty-card {
      background: linear-gradient(135deg, #2C1A0E 0%, #1a0d06 60%, #3d2210 100%);
      border-radius: 20px;
      padding: 22px 22px 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(44,26,14,0.28);
    }
    /* Decorative circle in bg */
    .loyalty-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(200,137,74,0.07);
    }
    .loyalty-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 20px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(200,137,74,0.05);
    }
    .loyalty-label-text {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(200,137,74,0.7);
      margin-bottom: 6px;
    }
    .loyalty-tier-name {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 18px;
      line-height: 1;
    }
    .progress-track {
      height: 7px;
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #C8894A, #e8a963);
      transition: width 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
      box-shadow: 0 0 8px rgba(200,137,74,0.5);
    }
    .progress-hint {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }

    /* ─── STATS ROW ─── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 8px 13px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(44,26,14,0.07);
    }
    body.dark .stat-card {
      background: #1A1A1A;
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: #C8894A;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #9A7D6B;
    }

    /* ─── BADGES SECTION ─── */
    .section-header {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #9A7D6B;
      margin-bottom: 12px;
    }
    .badges-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .badge-card {
      flex: 1;
      background: #fff;
      border-radius: 14px;
      padding: 16px 6px 13px;
      text-align: center;
      border: 2px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 2px 8px rgba(44,26,14,0.07);
    }
    body.dark .badge-card {
      background: #1A1A1A;
      box-shadow: none;
      border-color: transparent;
      border: 2px solid rgba(255,255,255,0.05);
    }
    .badge-card.earned {
      border-color: #C8894A;
      box-shadow: 0 4px 16px rgba(200,137,74,0.18);
    }
    body.dark .badge-card.earned {
      border-color: #C8894A;
      box-shadow: 0 4px 16px rgba(200,137,74,0.12);
    }
    .badge-card.locked { opacity: 0.35; }
    .badge-icon { font-size: 28px; margin-bottom: 7px; line-height: 1; }
    .badge-name {
      font-size: 11px;
      font-weight: 700;
      color: #2C1A0E;
      margin-bottom: 3px;
    }
    body.dark .badge-name { color: #FAF6F0; }
    .badge-status {
      font-size: 10px;
      color: #9A7D6B;
      font-weight: 600;
    }
    .badge-card.earned .badge-status { color: #C8894A; }

    /* ─── SOCIAL PROOF ─── */
    .social-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(44,26,14,0.07);
    }
    body.dark .social-section {
      background: #1A1A1A;
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .social-title {
      font-size: 14px;
      font-weight: 800;
      color: #2C1A0E;
      margin-bottom: 4px;
    }
    body.dark .social-title { color: #FAF6F0; }
    .social-sub {
      font-size: 12px;
      color: #9A7D6B;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .social-btns { display: flex; gap: 10px; }
    .social-btn {
      flex: 1;
      padding: 11px 8px;
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .social-btn:active { opacity: 0.8; transform: scale(0.98); }
    .btn-google {
      background: #FAF6F0;
      color: #2C1A0E;
      border: 1.5px solid #E8DDD5;
    }
    body.dark .btn-google { background: #2A2A2A; color: #FAF6F0; border-color: #333; }
    .btn-insta {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
    }

    /* ─── ACTION BUTTONS ─── */
    .action-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-action {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-action:active { opacity: 0.85; transform: scale(0.99); }
    .btn-menu    { background: #2C1A0E; color: #FAF6F0; box-shadow: 0 4px 16px rgba(44,26,14,0.2); }
    .btn-signout { background: transparent; color: #C8894A; border: 1.5px solid rgba(200,137,74,0.5); }
    body.dark .btn-menu { background: #C8894A; color: #fff; }
    body.dark .btn-signout { border-color: rgba(200,137,74,0.4); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <a href="/index.html" class="header-back">&#8592;</a>
  <span class="header-title">My Profile</span>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
</div>

<div id="loading">Loading your profile…</div>

<div id="content">
  <div class="page">

    <!-- Hero -->
    <div class="hero">
      <div class="avatar-wrap">

        <div class="avatar-ring"></div>
      </div>
      <div class="hero-name"    id="heroName"></div>
      <div class="hero-contact" id="heroContact"></div>
      <div class="tier-badge"   id="tierBadge"></div>
    </div>

    <!-- Loyalty Card -->
    <div class="loyalty-card">

        <div class="progress-fill" id="progressFill"></div>

      <div class="progress-hint" id="progressHint"></div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statVisits">—</div>
        <div class="stat-label">Visits</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSince">—</div>
        <div class="stat-label">Member Since</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLast">—</div>
        <div class="stat-label">Last Visit</div>
      </div>
    </div>

    <!-- Badges -->
    <div class="section-header">Your Journey</div>
    <div class="badges-row" id="badgesRow"></div>

    <!-- Social Proof -->
    <div class="social-section">
      <div class="social-title">Enjoying Kapi Coast?</div>
      <div class="social-sub">Share the love — it means the world to us ☕</div>
      <div class="social-btns">
        <a href="https://g.page/r/Ca5EPPEPHT4CEBM/review"
           target="_blank" rel="noopener" class="social-btn btn-google">
          <svg width="14" height="14" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.6 2.2 30.1 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.5 13.2 17.8 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
            <path fill="#FBBC05" d="M10.5 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.9.9 7.6 2.6 10.9l7.9-6.3z"/>
            <path fill="#34A853" d="M24 48c6.1 0 11.2-2 15-5.4l-7.5-5.8c-2 1.4-4.6 2.2-7.5 2.2-6.2 0-11.5-3.7-13.5-9.1l-7.9 6.3C6.6 42.6 14.6 48 24 48z"/>
          </svg>
          Rate on Google

        <a href="https://www.instagram.com/kapicoast/"
           target="_blank" rel="noopener" class="social-btn btn-insta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>

      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-btns">
      <button class="btn-action btn-menu"    onclick="window.location.href='/index.html'">View Menu</button>
      <button class="btn-action btn-signout" onclick="handleSignOut()">Sign Out</button>

  </div><!-- .page -->
</div><!-- #content -->

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Theme (synced with index.html via localStorage "theme") ──
const savedTheme = localStorage.getItem("theme") || "light";
document.body.classList.add(savedTheme);
syncThemeBtn(savedTheme === "dark");

function syncThemeBtn(isDark) {
  document.getElementById("themeBtn").textContent = isDark ? "☾ Dark" : "☀ Light";
}
window.toggleTheme = function () {
  const isDark = !document.body.classList.contains("dark");
  document.body.classList.toggle("dark",  isDark);
  document.body.classList.toggle("light", !isDark);
  localStorage.setItem("theme", isDark ? "dark" : "light");
  syncThemeBtn(isDark);
};

// ── Date helpers ──
// Fix: use .seconds * 1000 to ensure correct Firestore Timestamp conversion
function fmtFull(ts) {
  if (!ts || !ts.seconds) return "—";
  return new Date(ts.seconds * 1000).toLocaleDateString("en-IN", {
    day: "numeric", month: "short", year: "numeric"
  });
}
function fmtShort(ts) {
  if (!ts || !ts.seconds) return "—";
  return new Date(ts.seconds * 1000).toLocaleDateString("en-IN", {
    month: "short", year: "2-digit"
  });
}
function fmtDay(ts) {
  if (!ts || !ts.seconds) return "—";
  return new Date(ts.seconds * 1000).toLocaleDateString("en-IN", {
    day: "numeric", month: "short"
  });
}

// ── Loyalty ──
function tierKey(visits) {
  if (visits >= 6) return "vip";
  if (visits >= 2) return "regular";
  return "first";
}
const tierConfig = {
  first:   { label: "First Timer", pillClass: "tier-first",   icon: "☕" },
  regular: { label: "Regular",     pillClass: "tier-regular", icon: "⭐" },
  vip:     { label: "VIP Member",  pillClass: "tier-vip",     icon: "✦"  },
};
function loyaltyProgress(visits) {
  if (visits >= 6) return { pct: 100, hint: "You've reached VIP — thank you for your loyalty!" };
  if (visits >= 2) {
    const rem = 6 - visits;
    return { pct: Math.round(((visits - 2) / 4) * 100), hint: `${rem} more visit${rem > 1 ? "s" : ""} to unlock VIP` };
  }
  const rem = 2 - visits;
  return { pct: Math.round((visits / 2) * 100), hint: `${rem} more visit${rem > 1 ? "s" : ""} to become a Regular` };
}

// ── Main render ──
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "/login.html"; return; }

  const snap = await getDoc(doc(db, "customers", user.uid));
  if (!snap.exists()) { window.location.href = "/login.html"; return; }

  const data   = snap.data();
  const visits = data.visits || 1;
  const tier   = tierKey(visits);
  const cfg    = tierConfig[tier];

  // Avatar — first letter of name, large
  const initial = (data.name || "K").trim()[0].toUpperCase();
  document.getElementById("avatar").textContent = initial;

  // Identity
  document.getElementById("heroName").textContent = data.name || "Customer";
  const contact = [data.email, data.phone].filter(Boolean).join(" · ");
  document.getElementById("heroContact").textContent = contact || "";

  // Tier badge
  const tb = document.getElementById("tierBadge");
  tb.textContent = cfg.icon + "  " + cfg.label;
  tb.className   = "tier-badge " + cfg.pillClass;

  // Loyalty card
  document.getElementById("loyaltyTierName").textContent = cfg.label;
  const { pct, hint } = loyaltyProgress(visits);
  document.getElementById("progressHint").textContent = hint;

  // Stats — fixed firstVisit parsing
  document.getElementById("statVisits").textContent = visits;
  document.getElementById("statSince").textContent  = fmtShort(data.firstVisit);
  document.getElementById("statLast").textContent   = fmtDay(data.lastLogin);

  // Badges
  const badges = [
    { icon: "☕", name: "First Timer", req: "1 visit",  earned: visits >= 1 },
    { icon: "⭐", name: "Regular",     req: "2 visits", earned: visits >= 2 },
    { icon: "✦",  name: "VIP",         req: "6 visits", earned: visits >= 6 },
  ];
  document.getElementById("badgesRow").innerHTML = badges.map(b => `
    <div class="badge-card ${b.earned ? "earned" : "locked"}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-status">${b.earned ? "✓ Earned" : b.req}</div>
    </div>`).join("");

  // Reveal content, animate progress bar after reveal
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById("progressFill").style.width = pct + "%";
  }));
});

window.handleSignOut = async function () {
  await signOut(auth);
  window.location.href = "/login.html";
};
</script>
