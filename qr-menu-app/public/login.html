<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
</head>

<body style="font-family: Arial; text-align:center; padding-top:80px; background:#f5f5f5;">

<h2>Welcome to Kapi Coast</h2>
<p>Login to continue</p>

<!-- GOOGLE LOGIN -->
<button onclick="loginGoogle()" 
        style="padding:10px 20px; margin:10px; background:black; color:white; border:none; border-radius:5px;">
  Login with Google
</button>

<br>

<!-- PHONE LOGIN -->
<div class="input-wrap">
  <span class="input-prefix">+91</span>
  <input type="tel" id="phone" placeholder="9876543210" maxlength="10" pattern="[0-9]{10}">
</div>

<button id="sendBtn" onclick="sendOTP()"
        style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
  Send OTP
</button>

<div id="otpPanel" style="display:none;">
<br><br>

<input id="otp" placeholder="Enter OTP" style="padding:10px;"><br><br>

<button onclick="verifyOTP()"
        style="padding:10px 20px; background:blue; color:white; border:none; border-radius:5px;">
  Verify OTP
</button>
</div>

<div id="recaptcha-container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, GoogleAuthProvider, signInWithPopup,
  RecaptchaVerifier, signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp, increment }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------- COMMON SAVE FUNCTION ----------
async function saveUser(user, loginMethod) {
  const userRef = doc(db, "customers", user.uid);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    await updateDoc(userRef, {
      lastLogin: serverTimestamp(),
      visits: increment(1),
      loginMethod: loginMethod
    });
  } else {
    await setDoc(userRef, {
      uid: user.uid,
      name: user.displayName || "Customer",
      phone: user.phoneNumber || "",
      email: user.email || "",
      visits: 1,
      firstVisit: serverTimestamp(),
      lastLogin: serverTimestamp(),
      loginMethod: loginMethod
    });
  }

  window.location.href = "/profile.html";
}

// ---------- GOOGLE LOGIN ----------
window.loginGoogle = async function () {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  await saveUser(result.user, "google");
};

// ---------- PHONE LOGIN ----------
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'invisible'
});

window.sendOTP = async function () {
  let raw = document.getElementById("phone").value.trim().replace(/\D/g, "");

  if (raw.length !== 10) {
    alert("Please enter a valid 10-digit mobile number");
    return;
  }
  const phone = "+91" + raw;
  try {
    document.getElementById("sendBtn").disabled = true;
    const result = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    window.confirmationResult = result;
    document.getElementById("otpPanel").style.display = "block";
    document.getElementById("sendBtn").style.display = "none";
    alert("OTP sent to +91" + raw);
  } catch (e) {
    console.error(e);
    alert("Failed to send OTP: " + e.message);
    document.getElementById("sendBtn").disabled = false;
  }
};

window.verifyOTP = async function () {
  const code = document.getElementById("otp").value;

  const result = await window.confirmationResult.confirm(code);
  await saveUser(result.user, "phone");
};

</script>

</body>
</html>
