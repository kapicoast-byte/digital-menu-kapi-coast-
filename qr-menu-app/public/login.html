<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Kapi Coast</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: #FAF6F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: #C8894A;
      top: -120px; right: -100px;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: #2C1A0E;
      bottom: -80px; left: -80px;
    }

    /* Header */
    header {
      position: relative;
      z-index: 1;
      padding: 20px 32px;
      display: flex;
      align-items: center;
    }
    .brand {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2C1A0E;
    }

    /* Main layout */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 40px rgba(44, 26, 14, 0.08);
    }

    .pill {
      display: inline-block;
      background: #2C1A0E;
      color: #FAF6F0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    .card h1 {
      font-size: 26px;
      font-weight: 800;
      color: #2C1A0E;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .card .subtitle {
      font-size: 14px;
      color: #9A7D6B;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-dark {
      background: #2C1A0E;
      color: #FAF6F0;
    }
    .btn-dark:hover:not(:disabled) { opacity: 0.88; }

    .btn-outline {
      background: #fff;
      color: #2C1A0E;
      border: 1.5px solid #E0D5CC;
    }
    .btn-outline:hover:not(:disabled) { background: #FAF6F0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #9A7D6B;
      font-size: 12px;
      font-weight: 500;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E0D5CC;
    }

    /* Phone flow */
    #phoneFlow { display: none; margin-top: 16px; }

    .input-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #E0D5CC;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      background: #fff;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: #C8894A; }

    .input-prefix {
      padding: 0 14px;
      font-size: 15px;
      font-weight: 600;
      color: #2C1A0E;
      background: #FAF6F0;
      border-right: 1.5px solid #E0D5CC;
      height: 48px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 14px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      color: #2C1A0E;
      height: 48px;
      background: transparent;
    }
    .input-wrap input::placeholder { color: #C4B5AA; }

    .input-solo {
      width: 100%;
      border: 1.5px solid #E0D5CC;
      border-radius: 12px;
      padding: 0 14px;
      height: 48px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      color: #2C1A0E;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .input-solo:focus { border-color: #C8894A; }
    .input-solo::placeholder { color: #C4B5AA; }

    #otpPanel { display: none; margin-top: 4px; }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px 16px 28px;
      font-size: 12px;
      color: #9A7D6B;
    }
    footer a { color: #C8894A; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Google icon */
    .google-icon {
      width: 18px; height: 18px; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <header>
    <span class="brand">Kapi Coast</span>
  </header>

  <main>
    <div class="card">
      <span class="pill">Welcome Back</span>
      <h1>Your table.<br>Your coffee.</h1>
      <p class="subtitle">Sign in to view your visits and exclusive offers.</p>

      <!-- Google -->
      <button class="btn btn-dark" onclick="loginGoogle()">
        <svg class="google-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <!-- Phone trigger -->
      <button class="btn btn-outline" id="phoneToggleBtn" onclick="togglePhoneFlow()">
        Continue with Phone
      </button>

      <!-- Phone flow -->
      <div id="phoneFlow">
        <div class="input-wrap">
          <span class="input-prefix">+91</span>
          <input type="tel" id="phone" placeholder="9876543210" maxlength="10" pattern="[0-9]{10}">
        </div>
        <button class="btn btn-dark" id="sendBtn" onclick="sendOTP()">Send OTP</button>

        <div id="otpPanel">
          <div class="divider" style="margin-top:16px;">Enter OTP</div>
          <input type="number" id="otp" class="input-solo" placeholder="6-digit OTP">
          <button class="btn btn-dark" onclick="verifyOTP()">Verify &amp; Sign In</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    By signing in you agree to our <a href="#">Terms</a>
  </footer>

  <div id="recaptcha-container"></div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  RecaptchaVerifier, signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp, increment }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------- COMMON SAVE FUNCTION ----------
async function saveUser(user, loginMethod) {
  const userRef = doc(db, "customers", user.uid);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    await updateDoc(userRef, {
      lastLogin: serverTimestamp(),
      visits: increment(1),
      loginMethod: loginMethod
    });
  } else {
    await setDoc(userRef, {
      uid: user.uid,
      name: user.displayName || "Customer",
      phone: user.phoneNumber || "",
      email: user.email || "",
      visits: 1,
      firstVisit: serverTimestamp(),
      lastLogin: serverTimestamp(),
      loginMethod: loginMethod
    });
  }

  window.location.href = "/profile.html";
}

// ---------- GOOGLE LOGIN ----------
window.loginGoogle = async function () {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  await saveUser(result.user, "google");
};

// ---------- PHONE TOGGLE ----------
window.togglePhoneFlow = function () {
  const flow = document.getElementById("phoneFlow");
  const btn = document.getElementById("phoneToggleBtn");
  const visible = flow.style.display === "block";
  flow.style.display = visible ? "none" : "block";
  btn.textContent = visible ? "Continue with Phone" : "Hide";
};

// ---------- PHONE LOGIN ----------
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'invisible'
});

window.sendOTP = async function () {
  let raw = document.getElementById("phone").value.trim().replace(/\D/g, "");

  if (raw.length !== 10) {
    alert("Please enter a valid 10-digit mobile number");
    return;
  }
  const phone = "+91" + raw;
  try {
    document.getElementById("sendBtn").disabled = true;
    const result = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    window.confirmationResult = result;
    document.getElementById("otpPanel").style.display = "block";
    document.getElementById("sendBtn").style.display = "none";
    alert("OTP sent to +91" + raw);
  } catch (e) {
    console.error(e);
    alert("Failed to send OTP: " + e.message);
    document.getElementById("sendBtn").disabled = false;
  }
};

window.verifyOTP = async function () {
  const code = document.getElementById("otp").value;

  const result = await window.confirmationResult.confirm(code);
  await saveUser(result.user, "phone");
};

  </script>

</body>
</html>
