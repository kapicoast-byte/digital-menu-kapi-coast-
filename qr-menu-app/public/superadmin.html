<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapi Coast — Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', Arial, sans-serif;
      background: #FAF6F0;
      min-height: 100vh;
      color: #2C1A0E;
    }

    /* ── Header ── */
    .header {
      background: #2C1A0E;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    .header-brand { display: flex; flex-direction: column; gap: 2px; }
    .header-logo  { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 0.3px; }
    .header-sub   { font-size: 11px; font-weight: 600; color: #C8894A; letter-spacing: 0.1em; text-transform: uppercase; }
    .header-badge {
      background: rgba(200,137,74,0.2);
      color: #C8894A;
      font-size: 11px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* ── Layout ── */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    .page-title {
      font-size: 26px; font-weight: 800; color: #2C1A0E;
      margin-bottom: 4px;
    }
    .page-sub { font-size: 14px; color: #9A7D6B; margin-bottom: 32px; }

    /* ── Outlet grid ── */
    .outlets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 36px;
    }

    .outlet-card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 2px 14px rgba(44,26,14,0.08);
      border: 1.5px solid #EDE5DB;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      position: relative;
    }
    .outlet-card:hover {
      border-color: #C8894A;
      box-shadow: 0 4px 22px rgba(200,137,74,0.18);
      transform: translateY(-2px);
    }

    .outlet-card-id {
      font-size: 10px; font-weight: 700;
      color: #C8894A; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .outlet-card-name {
      font-size: 18px; font-weight: 800;
      color: #2C1A0E; margin-bottom: 3px;
    }
    .outlet-card-location {
      font-size: 13px; color: #9A7D6B;
      margin-bottom: 16px;
    }

    .outlet-stats {
      display: flex; gap: 16px;
    }
    .outlet-stat {
      display: flex; flex-direction: column; gap: 1px;
    }
    .outlet-stat-val {
      font-size: 20px; font-weight: 800; color: #2C1A0E;
    }
    .outlet-stat-label {
      font-size: 11px; color: #9A7D6B; font-weight: 600;
    }

    .outlet-ad-pill {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-top: 14px;
    }
    .outlet-ad-pill.on  { background: #e8f5e9; color: #2e7d32; }
    .outlet-ad-pill.off { background: #f5f5f5; color: #999; }

    .outlet-card-actions {
      position: absolute; top: 14px; right: 14px;
      display: flex; gap: 6px;
    }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid #EDE5DB; background: #FAF6F0;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #EDE5DB; }
    .icon-btn.danger:hover { background: #fde8e8; border-color: #f5c6c6; }

    .open-arrow {
      position: absolute; bottom: 18px; right: 18px;
      font-size: 18px; color: #C8894A; font-weight: 800;
      opacity: 0.6;
    }

    /* ── Add Outlet panel ── */
    .add-panel {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 14px rgba(44,26,14,0.08);
      border: 1.5px solid #EDE5DB;
      max-width: 500px;
    }
    .add-panel h3 {
      font-size: 17px; font-weight: 800;
      color: #2C1A0E; margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: #9A7D6B; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 5px;
    }
    .field-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #E0D5CC;
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 14px; color: #2C1A0E;
      background: #FAF6F0;
      outline: none; margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: #C8894A; background: #fff; }
    .field-input::placeholder { color: #C4B5A8; }

    .btn {
      padding: 11px 22px;
      border: none; border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #2C1A0E; color: #fff; }
    .btn-danger  { background: #c62828; color: #fff; }

    #addOutletStatus {
      font-size: 13px; font-weight: 600;
      margin-top: 10px; min-height: 18px;
    }

    /* ── Loading / empty states ── */
    .loading-msg {
      color: #9A7D6B; font-size: 14px;
      font-weight: 600; padding: 20px 0;
    }

    /* ── Edit modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(44,26,14,0.45);
      z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 18px;
      padding: 32px;
      width: 440px; max-width: calc(100vw - 32px);
      box-shadow: 0 8px 40px rgba(44,26,14,0.25);
    }
    .modal h3 { font-size: 17px; font-weight: 800; color: #2C1A0E; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-outline {
      background: #fff; color: #2C1A0E;
      border: 1.5px solid #D4C4B4;
    }

    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .page { padding: 20px 14px 60px; }
      .page-title { font-size: 20px; }
      .outlets-grid { grid-template-columns: 1fr; }
      .add-panel { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-brand">
    <span class="header-logo">Kapi Coast</span>
    <span class="header-sub">Super Admin</span>
  </div>
  <span class="header-badge">All Outlets</span>
</header>

<div class="page">
  <div class="page-title">Outlets</div>
  <div class="page-sub">Manage all Kapi Coast locations from one place.</div>

  <div id="outletGrid" class="outlets-grid">
    <div class="loading-msg">Loading outlets…</div>
  </div>

  <!-- Add new outlet -->
  <div class="add-panel">
    <h3>Add New Outlet</h3>
    <label class="field-label" for="newOutletId">Outlet ID</label>
    <input class="field-input" type="text" id="newOutletId" placeholder="e.g. omr, tnagar">

    <label class="field-label" for="newOutletName">Outlet Name</label>
    <input class="field-input" type="text" id="newOutletName" placeholder="e.g. OMR Food Street">

    <label class="field-label" for="newOutletLocation">Location</label>
    <input class="field-input" type="text" id="newOutletLocation" placeholder="e.g. Old Mahabalipuram Road">

    <button class="btn btn-primary" onclick="addOutlet()">Add Outlet</button>
    <div id="addOutletStatus"></div>
  </div>
</div>

<!-- ── Edit modal ── -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Outlet</h3>
    <input type="hidden" id="editOutletId">
    <label class="field-label" for="editOutletName">Outlet Name</label>
    <input class="field-input" type="text" id="editOutletName">
    <label class="field-label" for="editOutletLocation">Location</label>
    <input class="field-input" type="text" id="editOutletLocation">
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEditOutlet()">Save</button>
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
    </div>
    <div id="editOutletStatus" style="font-size:13px;font-weight:600;margin-top:10px;"></div>
  </div>
</div>

<script type="module">
const pass = sessionStorage.getItem("superAdminAuth");
if (!pass) {
  const entered = prompt("Enter super admin password:");
  if (entered !== "kapi2024") {
    alert("Wrong password!");
    window.location.href = "index.html";
  } else {
    sessionStorage.setItem("superAdminAuth", "true");
  }
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

function escapeHtml(v) {
  return String(v ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function loadOutlets() {
  const grid = document.getElementById("outletGrid");
  const snap = await getDocs(collection(db, "outlets"));

  if (snap.empty) {
    grid.innerHTML = `<div class="loading-msg">No outlets yet. Add one below.</div>`;
    return;
  }

  // Load each outlet with its menu item count + active ad status in parallel
  const outlets = [];
  for (const d of snap.docs) {
    outlets.push({ id: d.id, ...d.data() });
  }

  const enriched = await Promise.all(outlets.map(async o => {
    const [menuSnap, adSnap] = await Promise.all([
      getDocs(collection(db, "outlets", o.id, "menu")),
      getDocs(query(collection(db, "outlets", o.id, "ads"), where("active", "==", true)))
    ]);
    return { ...o, itemCount: menuSnap.size, hasActiveAd: !adSnap.empty };
  }));

  grid.innerHTML = enriched.map(o => `
    <div class="outlet-card" onclick="openAdmin('${escapeHtml(o.id)}')">
      <div class="outlet-card-actions">
        <button class="icon-btn" title="Edit"
          onclick="event.stopPropagation(); openEditModal('${escapeHtml(o.id)}', '${escapeHtml(o.name || "")}', '${escapeHtml(o.location || "")}')">✏️</button>
        <button class="icon-btn danger" title="Delete"
          onclick="event.stopPropagation(); confirmDeleteOutlet('${escapeHtml(o.id)}')">🗑️</button>
      </div>
      <div class="outlet-card-id">${escapeHtml(o.id)}</div>
      <div class="outlet-card-name">${escapeHtml(o.name || o.id)}</div>
      <div class="outlet-card-location">${escapeHtml(o.location || "—")}</div>
      <div class="outlet-stats">
        <div class="outlet-stat">
          <span class="outlet-stat-val">${o.itemCount}</span>
          <span class="outlet-stat-label">Menu Items</span>
        </div>
      </div>
      <span class="outlet-ad-pill ${o.hasActiveAd ? "on" : "off"}">
        ${o.hasActiveAd ? "Ad Active" : "No Active Ad"}
      </span>
      <span class="open-arrow">→</span>
    </div>`).join("");
}

window.openAdmin = function (outletId) {
  window.location.href = "admin.html?outlet=" + encodeURIComponent(outletId);
};

window.addOutlet = async function () {
  const id       = document.getElementById("newOutletId").value.trim().toLowerCase().replace(/\s+/g, "-");
  const name     = document.getElementById("newOutletName").value.trim();
  const location = document.getElementById("newOutletLocation").value.trim();
  const st       = document.getElementById("addOutletStatus");

  if (!id || !name) {
    st.style.color = "#c62828";
    st.textContent = "Outlet ID and Name are required.";
    return;
  }

  const ref = doc(db, "outlets", id);
  const existing = await getDoc(ref);
  if (existing.exists()) {
    st.style.color = "#c62828";
    st.textContent = `Outlet "${id}" already exists.`;
    return;
  }

  await setDoc(ref, { name, location, createdAt: new Date().toISOString() });
  st.style.color = "#2e7d32";
  st.textContent = `Outlet "${name}" added!`;
  document.getElementById("newOutletId").value       = "";
  document.getElementById("newOutletName").value     = "";
  document.getElementById("newOutletLocation").value = "";
  loadOutlets();
};

window.openEditModal = function (id, name, location) {
  document.getElementById("editOutletId").value       = id;
  document.getElementById("editOutletName").value     = name;
  document.getElementById("editOutletLocation").value = location;
  document.getElementById("editOutletStatus").textContent = "";
  document.getElementById("editModal").classList.add("open");
};

window.closeEditModal = function () {
  document.getElementById("editModal").classList.remove("open");
};

window.saveEditOutlet = async function () {
  const id       = document.getElementById("editOutletId").value;
  const name     = document.getElementById("editOutletName").value.trim();
  const location = document.getElementById("editOutletLocation").value.trim();
  const st       = document.getElementById("editOutletStatus");

  if (!name) { st.style.color = "#c62828"; st.textContent = "Name is required."; return; }

  await updateDoc(doc(db, "outlets", id), { name, location });
  st.style.color = "#2e7d32";
  st.textContent = "Saved!";
  setTimeout(() => { closeEditModal(); loadOutlets(); }, 700);
};

window.confirmDeleteOutlet = async function (id) {
  if (!confirm(`Delete outlet "${id}"?\n\nThis removes the outlet record only — menu items and ads inside it are not deleted.`)) return;
  await deleteDoc(doc(db, "outlets", id));
  loadOutlets();
};

loadOutlets();
</script>

</body>
</html>
