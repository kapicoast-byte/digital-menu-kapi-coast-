<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapi Coast Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', Arial, sans-serif;
      height: 100vh; overflow: hidden;
    }

    /* ─────────────────────────────────────────
       TEMPLATE CSS VARIABLES
       Set via body class: tmpl-dark | tmpl-bright | tmpl-bold
    ───────────────────────────────────────── */
    body, body.tmpl-dark {
      --bg:           #0D0D0D;
      --bar-bg:       #1A1A1A;
      --bar-border:   1px solid #C8894A;
      --bar-text:     #fff;
      --bar-sub:      rgba(255,255,255,0.35);
      --cat-name-clr: #C8894A;
      --slide-bg:     #0D0D0D;
      --card-bg:      #1A1A1A;
      --card-name:    #fff;
      --card-price:   #C8894A;
      --card-border:  #2A2A2A;
      --prog-bg:      rgba(255,255,255,0.08);
      --prog-fill:    #C8894A;
      --divider-grad: linear-gradient(90deg, #C8894A, transparent);
      --empty-sub:    rgba(255,255,255,0.25);
    }
    body.tmpl-bright {
      --bg:           #FAF6F0;
      --bar-bg:       #fff;
      --bar-border:   2px solid #C8894A;
      --bar-text:     #2C1A0E;
      --bar-sub:      #9A7D6B;
      --cat-name-clr: #2C1A0E;
      --slide-bg:     #FAF6F0;
      --card-bg:      #fff;
      --card-name:    #2C1A0E;
      --card-price:   #C8894A;
      --card-border:  #EDE5DB;
      --prog-bg:      rgba(44,26,14,0.1);
      --prog-fill:    #C8894A;
      --divider-grad: linear-gradient(90deg, #C8894A, transparent);
      --empty-sub:    #9A7D6B;
    }
    body.tmpl-bold {
      --bg:           #0F2027;
      --bar-bg:       rgba(0,0,0,0.55);
      --bar-border:   none;
      --bar-text:     #fff;
      --bar-sub:      rgba(255,255,255,0.5);
      --cat-name-clr: #fff;
      --slide-bg:     #0F2027;
      --card-bg:      rgba(0,0,0,0.55);
      --card-name:    #fff;
      --card-price:   #FFD166;
      --card-border:  rgba(255,255,255,0.15);
      --prog-bg:      rgba(255,255,255,0.1);
      --prog-fill:    #FFD166;
      --divider-grad: linear-gradient(90deg, rgba(255,255,255,0.4), transparent);
      --empty-sub:    rgba(255,255,255,0.35);
    }

    /* ─────────────────────────────────────────
       TOP BAR — fixed, always on top
    ───────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 64px;
      background: var(--bar-bg);
      border-bottom: var(--bar-border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 200;
      backdrop-filter: blur(8px);
    }
    .top-logo {
      font-size: 18px; font-weight: 800;
      color: #C8894A;
      letter-spacing: 3px; text-transform: uppercase;
      flex-shrink: 0;
    }
    .top-category {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 13px; font-weight: 700;
      color: var(--bar-sub);
      letter-spacing: 2.5px; text-transform: uppercase;
      max-width: 46%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .top-clock {
      font-size: 20px; font-weight: 700;
      color: var(--bar-text);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px; flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       PROGRESS BAR — fixed at very bottom
    ───────────────────────────────────────── */
    .progress-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 4px; background: var(--prog-bg); z-index: 200;
    }
    .progress-bar { height: 100%; width: 0%; background: var(--prog-fill); }

    /* ─────────────────────────────────────────
       SLIDE VIEWPORT — between top bar and progress bar
    ───────────────────────────────────────── */
    .slide-viewport {
      position: fixed; top: 64px; bottom: 4px;
      left: 0; right: 0;
      overflow: hidden;
      background: var(--bg);
    }

    /* ─────────────────────────────────────────
       SINGLE SLIDE CONTAINER
       Content is swapped while opacity = 0
    ───────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      opacity: 1; transition: opacity 0.7s ease;
    }
    .slide.hidden { opacity: 0; }

    /* ─────────────────────────────────────────
       CATEGORY SLIDE
    ───────────────────────────────────────── */
    .cat-slide {
      width: 100%; height: 100%;
      background: var(--slide-bg);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .cat-header {
      padding: 18px 52px 6px;
      flex-shrink: 0;
      display: flex; align-items: baseline;
      justify-content: space-between;
    }
    .cat-name {
      font-size: 28px; font-weight: 800;
      color: var(--cat-name-clr);
      letter-spacing: 0.5px; line-height: 1;
      text-transform: uppercase;
    }
    .cat-count {
      font-size: 13px; font-weight: 600;
      color: var(--bar-sub); letter-spacing: 0.5px;
      flex-shrink: 0; margin-left: 16px;
    }
    .cat-divider {
      height: 2px; margin: 0 52px 12px; flex-shrink: 0;
      background: var(--divider-grad);
    }

    /* ─── Grid layouts ─── */
    .cat-grid {
      flex: 1; display: grid;
      gap: 16px; padding: 0 48px 24px;
      min-height: 0;
    }
    /* 2 items: 2 cols, 1 row */
    .cat-grid.layout-2  { grid-template-columns: repeat(2,1fr); grid-template-rows: 1fr; }
    /* 3-4 items: 2 cols, 2 rows */
    .cat-grid.layout-34 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(2,1fr); }
    /* 5-6 items: 2 cols, 3 rows */
    .cat-grid.layout-56 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(3,1fr); }
    /* 7-9 items: 3 cols, 3 rows */
    .cat-grid.layout-79 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }

    /* ─────────────────────────────────────────
       ITEM CARD
    ───────────────────────────────────────── */
    .item-card {
      background: #1A1A1A;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .item-card.sold-out { opacity: 0.45; }

    /* Image — top portion of card, flex ratio set per layout */
    .card-img-wrap {
      position: relative; overflow: hidden;
      min-height: 0; flex: 6;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Veg dot — top-left corner of image */
    .veg-ind {
      position: absolute; top: 8px; left: 8px;
      width: 12px; height: 12px; border-radius: 2px;
      border: 1.5px solid rgba(255,255,255,0.7);
    }
    .veg-green { background: #22C55E; }
    .veg-red   { background: #EF4444; }

    /* Sold-out overlay */
    .sold-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      color: #fff; letter-spacing: 2px; text-transform: uppercase;
    }

    /* Popular gold badge — top-right of image */
    .popular-badge {
      position: absolute; top: 8px; right: 8px;
      background: #C8894A; color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 3px 7px; border-radius: 6px;
      letter-spacing: 0.3px;
    }

    /* Text info area — below image */
    .card-info {
      flex: 4; display: flex; flex-direction: column; justify-content: center;
      padding: 8px 12px; min-height: 0;
    }
    .card-name {
      font-weight: 700; line-height: 1.3; margin-bottom: 3px;
      color: var(--card-name);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-price { font-weight: 800; color: var(--card-price); }

    /* ── Layout-specific image ratio + font sizes ── */
    /* 2 items: 60% image */
    .layout-2 .card-img-wrap { flex: 6; }
    .layout-2 .card-info     { flex: 4; padding: 16px 20px; }
    .layout-2 .card-name     { font-size: 32px; -webkit-line-clamp: 2; }
    .layout-2 .card-price    { font-size: 28px; margin-top: 8px; }

    /* 3-4 items: 55% image */
    .layout-34 .card-img-wrap { flex: 55; }
    .layout-34 .card-info     { flex: 45; padding: 10px 14px; }
    .layout-34 .card-name     { font-size: 24px; }
    .layout-34 .card-price    { font-size: 22px; margin-top: 5px; }

    /* 5-6 items: 50% image */
    .layout-56 .card-img-wrap { flex: 5; }
    .layout-56 .card-info     { flex: 5; padding: 8px 12px; }
    .layout-56 .card-name     { font-size: 20px; }
    .layout-56 .card-price    { font-size: 18px; margin-top: 4px; }

    /* 7-9 items: 45% image */
    .layout-79 .card-img-wrap { flex: 45; }
    .layout-79 .card-info     { flex: 55; padding: 6px 9px; }
    .layout-79 .card-name     { font-size: 16px; }
    .layout-79 .card-price    { font-size: 14px; margin-top: 3px; }

    /* ─────────────────────────────────────────
       CINEMATIC SINGLE-ITEM SLIDE
    ───────────────────────────────────────── */
    .cinema-img-wrap {
      width: 100%; flex: 7;
      position: relative; overflow: hidden; min-height: 0;
    }
    .cinema-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .cinema-gradient {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 70%;
      background: linear-gradient(to top, rgba(0,0,0,0.96) 0%, transparent 100%);
      pointer-events: none;
    }
    .cinema-text {
      flex: 3; width: 100%; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 28px 80px;
      background: #0A0A0A;
    }
    .cinema-cat {
      font-size: 15px; font-weight: 700;
      color: #C8894A; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .cinema-name-row {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin-bottom: 12px;
    }
    .cinema-veg {
      width: 16px; height: 16px; border-radius: 3px;
      border: 2px solid rgba(255,255,255,0.5); flex-shrink: 0;
    }
    .cinema-name {
      font-size: 80px; font-weight: 800;
      color: #fff; line-height: 1; letter-spacing: -2px;
    }
    .cinema-price {
      font-size: 56px; font-weight: 800;
      color: #C8894A; line-height: 1; margin-bottom: 10px;
    }
    .cinema-desc {
      font-size: 24px; font-weight: 500;
      color: rgba(255,255,255,0.55); line-height: 1.5;
      max-width: 700px;
    }

    /* ─────────────────────────────────────────
       OFFER SLIDE — same across all templates
    ───────────────────────────────────────── */
    .offer-slide {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1A0E06 0%, #2C1A0E 60%, #1A0E06 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 120px;
    }
    .offer-pill {
      display: inline-block; font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: #C8894A;
      border: 1px solid rgba(200,137,74,0.4);
      padding: 7px 28px; border-radius: 32px; margin-bottom: 40px;
    }
    .offer-deco {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, #C8894A, transparent);
      margin: 0 auto 32px;
    }
    .offer-deco.below { margin: 32px auto 40px; }
    .offer-title {
      font-size: 72px; font-weight: 800; color: #fff;
      line-height: 1.08; letter-spacing: -1px; max-width: 900px;
    }
    .offer-body {
      font-size: 32px; font-weight: 500;
      color: #C8894A; line-height: 1.5; max-width: 760px;
    }
    .offer-footer {
      margin-top: 48px; font-size: 14px; font-weight: 600;
      letter-spacing: 2px; color: rgba(255,255,255,0.2); text-transform: uppercase;
    }

    /* ─────────────────────────────────────────
       LOADING / EMPTY STATE
    ───────────────────────────────────────── */
    .empty-slide {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .empty-logo { font-size: 64px; font-weight: 800; color: #C8894A; letter-spacing: 2px; }
    .empty-sub  { font-size: 18px; color: var(--empty-sub, rgba(255,255,255,0.25)); font-weight: 500; }
  </style>
</head>
<body class="tmpl-dark">

<!-- ── Top bar ── -->
<div class="top-bar">
  <div class="top-logo" id="displayLogo">Kapi Coast</div>
  <div class="top-category" id="topCategory"></div>
  <div class="top-clock" id="clock"></div>
</div>

<!-- ── Slide viewport ── -->
<div class="slide-viewport">
  <div class="slide" id="slide">
    <div class="empty-slide">
      <div class="empty-logo">KAPI COAST</div>
      <div class="empty-sub">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Progress bar ── -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Outlet from URL — must be first ──
const urlParams = new URLSearchParams(window.location.search);
const outlet    = urlParams.get("outlet") || "ecr";
console.log("Display outlet:", outlet);

// ── Fetch and show outlet name in header ──
getDoc(doc(db, "outlets", outlet)).then(snap => {
  document.getElementById("displayLogo").textContent =
    snap.exists() ? (snap.data().name || outlet) : outlet;
});

// ── Clock ──
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-IN", {
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true
    });
}
updateClock();
setInterval(updateClock, 1000);

// ── Helpers ──
function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Bold Promo: per-category gradient palette ──
const BOLD_GRADS = [
  "linear-gradient(135deg,#0F2027,#203A43,#2C5364)",
  "linear-gradient(135deg,#1a0533,#3a0d6e,#5a1fa8)",
  "linear-gradient(135deg,#0a1628,#0e2d4a,#155a8a)",
  "linear-gradient(135deg,#1a2a00,#2e5200,#3d7000)",
  "linear-gradient(135deg,#2C1A0E,#7a3d0d,#C8894A)",
  "linear-gradient(135deg,#1a0010,#4d0030,#8b0050)",
  "linear-gradient(135deg,#001a1a,#004d4d,#007878)",
];
function boldGradient(cat) {
  let h = 0;
  for (let i = 0; i < cat.length; i++) h = cat.charCodeAt(i) + ((h << 5) - h);
  return BOLD_GRADS[Math.abs(h) % BOLD_GRADS.length];
}

// ── State ──
let menuItems   = [];
let activeOffer = null;
let cfg = {
  template:        "dark",
  intervalSeconds: 10,
  hiddenCategories: [],
  maxItemsPerSlide: 9,
  showOffers:      true
};
let slides       = [];
let slideIndex   = 0;
let rotateTimer  = null;
let transitioning = false;

// ── CSS layout class by item count ──
function layoutClass(n) {
  if (n <= 2)  return "layout-2";
  if (n <= 4)  return "layout-34";
  if (n <= 6)  return "layout-56";
  return "layout-79"; // 7-9
}

// ── Build slide list from categories ──
function buildSlides() {
  slides = [];
  const { hiddenCategories = [], maxItemsPerSlide = 9, showOffers = true } = cfg;
  const cap = Math.min(maxItemsPerSlide, 9); // never more than 9 per slide

  const catMap = {};
  menuItems.forEach(item => {
    const cat = (item.category || "Others").trim();
    if (hiddenCategories.includes(cat)) return;
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(item);
  });

  Object.keys(catMap).sort().forEach(cat => {
    const items      = catMap[cat];
    const pageCount  = Math.ceil(items.length / cap);
    for (let p = 0; p < pageCount; p++) {
      slides.push({
        type: "category", category: cat,
        items:      items.slice(p * cap, (p + 1) * cap),
        totalItems: items.length,
        page: p + 1, totalPages: pageCount
      });
    }
  });

  if (showOffers && activeOffer) slides.push({ type: "offer", data: activeOffer });
}

// ── HTML: item card (multi-item grids) ──
function itemCardHTML(item) {
  const vegDot = item.veg === "veg"
    ? `<span class="veg-ind veg-green"></span>`
    : item.veg === "nonveg"
    ? `<span class="veg-ind veg-red"></span>` : "";
  const out     = item.available === false || item.soldOut === true;
  const popular = item.popular ? `<span class="popular-badge">★ Popular</span>` : "";
  return `<div class="item-card${out ? " sold-out" : ""}">
    <div class="card-img-wrap">
      <img src="${esc(item.imageUrl || "")}" alt="${esc(item.name)}" loading="lazy">
      ${vegDot}${popular}${out ? '<div class="sold-overlay">Sold Out</div>' : ""}
    </div>
    <div class="card-info">
      <div class="card-name">${esc(item.name)}</div>
      <div class="card-price">Rs. ${esc(item.price)}</div>
    </div>
  </div>`;
}

// ── HTML: cinematic single-item slide ──
function singleItemSlideHTML(slide) {
  const { category, items } = slide;
  const item   = items[0];
  const bgAttr = cfg.template === "bold"
    ? ` style="background:${boldGradient(category)};"` : "";
  const vegDot = item.veg === "veg"
    ? `<span class="cinema-veg veg-green"></span>`
    : item.veg === "nonveg"
    ? `<span class="cinema-veg veg-red"></span>` : "";
  return `<div class="cat-slide"${bgAttr}>
    <div class="cinema-img-wrap">
      <img src="${esc(item.imageUrl || "")}" alt="${esc(item.name)}" loading="lazy">
      <div class="cinema-gradient"></div>
    </div>
    <div class="cinema-text">
      <div class="cinema-cat">${esc(category)}</div>
      <div class="cinema-name-row">
        ${vegDot}
        <div class="cinema-name">${esc(item.name)}</div>
      </div>
      <div class="cinema-price">Rs. ${esc(item.price)}</div>
      ${item.description ? `<div class="cinema-desc">${esc(item.description)}</div>` : ""}
    </div>
  </div>`;
}

// ── HTML: category slide ──
function catSlideHTML(slide) {
  const { category, items, page, totalPages, totalItems } = slide;
  if (items.length === 1) return singleItemSlideHTML(slide);
  const layout    = layoutClass(items.length);
  const titleText = totalPages > 1 ? `${category} ${page}/${totalPages}` : category;
  const countText = totalPages > 1
    ? `Slide ${page}/${totalPages}`
    : `${items.length} item${items.length !== 1 ? "s" : ""}`;
  const bgAttr = cfg.template === "bold"
    ? ` style="background:${boldGradient(category)};"` : "";
  return `<div class="cat-slide"${bgAttr}>
    <div class="cat-header">
      <div class="cat-name">${esc(titleText)}</div>
      <div class="cat-count">${esc(countText)}</div>
    </div>
    <div class="cat-divider"></div>
    <div class="cat-grid ${layout}">
      ${items.map(itemCardHTML).join("")}
    </div>
  </div>`;
}

// ── HTML: offer slide ──
function offerHTML(d) {
  return `<div class="offer-slide">
    <span class="offer-pill">Today's Offer</span>
    <div class="offer-deco"></div>
    <div class="offer-title">${esc(d.title)}</div>
    <div class="offer-deco below"></div>
    <div class="offer-body">${esc(d.body)}</div>
    <div class="offer-footer">menu.kapicoast.org</div>
  </div>`;
}

function makeSlideHTML(slide) {
  if (!slide) return emptyHTML("No content");
  if (slide.type === "offer")    return offerHTML(slide.data);
  if (slide.type === "category") return catSlideHTML(slide);
  return emptyHTML("No content");
}
function emptyHTML(msg) {
  return `<div class="empty-slide">
    <div class="empty-logo">KAPI COAST</div>
    <div class="empty-sub">${esc(msg)}</div>
  </div>`;
}

// ── Progress bar ──
function startProgress() {
  const bar = document.getElementById("progressBar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  bar.offsetWidth; // force reflow
  bar.style.transition = `width ${cfg.intervalSeconds}s linear`;
  bar.style.width = "100%";
}

// ── Update top bar category label ──
function updateTopLabel(slide) {
  document.getElementById("topCategory").textContent =
    !slide ? "" : slide.type === "offer" ? "Today's Offer" : slide.category;
}

// ── Transition: fade out → swap content → fade in ──
async function transitionTo(idx) {
  if (transitioning) return;
  transitioning = true;

  const slideEl = document.getElementById("slide");
  slideEl.classList.add("hidden");
  await sleep(720); // match CSS transition

  const slide = slides[idx];
  slideEl.innerHTML = slides.length
    ? makeSlideHTML(slide)
    : emptyHTML("No menu items yet");

  updateTopLabel(slide || null);
  slideEl.classList.remove("hidden");
  startProgress();
  transitioning = false;
}

// ── Auto-rotation ──
function startRotation() {
  clearInterval(rotateTimer);
  slideIndex = 0;
  if (!slides.length) {
    document.getElementById("slide").innerHTML = emptyHTML("No menu items yet");
    return;
  }
  transitionTo(0);
  rotateTimer = setInterval(async () => {
    slideIndex = (slideIndex + 1) % slides.length;
    await transitionTo(slideIndex);
  }, cfg.intervalSeconds * 1000);
}

function rebuild() {
  buildSlides();
  clearInterval(rotateTimer);
  startRotation();
}

// ── Live: menu items ──
onSnapshot(collection(db, "outlets", outlet, "menu"), snap => {
  menuItems = [];
  snap.forEach(d => {
    const item = { ...d.data(), id: d.id };
    item.category = (item.category || "Others").trim();
    menuItems.push(item);
  });
  menuItems.sort((a, b) =>
    a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  rebuild();
});

// ── Live: active offer ──
onSnapshot(query(collection(db, "outlets", outlet, "ads"), where("active", "==", true)), snap => {
  activeOffer = snap.empty ? null : snap.docs[0].data();
  rebuild();
});

// ── Live: display settings — instant template switch + rebuild ──
onSnapshot(doc(db, "outlets", outlet, "settings", "display"), snap => {
  if (!snap.exists()) return;
  const d = snap.data();
  cfg = {
    template:         d.template         || "dark",
    intervalSeconds:  d.intervalSeconds  || 10,
    hiddenCategories: d.hiddenCategories || [],
    maxItemsPerSlide: d.maxItemsPerSlide || 6,
    showOffers:       d.showOffers !== false
  };
  // Apply template class immediately (CSS variable switch — no reload needed)
  document.body.className = "tmpl-" + cfg.template;
  rebuild();
});
</script>

</body>
