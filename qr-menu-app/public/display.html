<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', Arial, sans-serif;
      height: 100vh; overflow: hidden;
    }

    /* ─────────────────────────────────────────
       TEMPLATE CSS VARIABLES
       Set via body class: tmpl-dark | tmpl-bright | tmpl-bold
    ───────────────────────────────────────── */
    body, body.tmpl-dark {
      --bg:           #0D0D0D;
      --bar-bg:       #1A1A1A;
      --bar-border:   1px solid #C8894A;
      --bar-text:     #fff;
      --bar-sub:      rgba(255,255,255,0.35);
      --cat-name-clr: #C8894A;
      --slide-bg:     #0D0D0D;
      --card-bg:      #1A1A1A;
      --card-name:    #fff;
      --card-price:   #C8894A;
      --card-border:  #2A2A2A;
      --prog-bg:      rgba(255,255,255,0.08);
      --prog-fill:    #C8894A;
      --divider-grad: linear-gradient(90deg, #C8894A, transparent);
      --empty-sub:    rgba(255,255,255,0.25);
    }
    body.tmpl-bright {
      --bg:           #FAF6F0;
      --bar-bg:       #fff;
      --bar-border:   2px solid #C8894A;
      --bar-text:     #2C1A0E;
      --bar-sub:      #9A7D6B;
      --cat-name-clr: #2C1A0E;
      --slide-bg:     #FAF6F0;
      --card-bg:      #fff;
      --card-name:    #2C1A0E;
      --card-price:   #C8894A;
      --card-border:  #EDE5DB;
      --prog-bg:      rgba(44,26,14,0.1);
      --prog-fill:    #C8894A;
      --divider-grad: linear-gradient(90deg, #C8894A, transparent);
      --empty-sub:    #9A7D6B;
    }
    body.tmpl-bold {
      --bg:           #0F2027;
      --bar-bg:       rgba(0,0,0,0.55);
      --bar-border:   none;
      --bar-text:     #fff;
      --bar-sub:      rgba(255,255,255,0.5);
      --cat-name-clr: #fff;
      --slide-bg:     #0F2027;
      --card-bg:      rgba(0,0,0,0.55);
      --card-name:    #fff;
      --card-price:   #FFD166;
      --card-border:  rgba(255,255,255,0.15);
      --prog-bg:      rgba(255,255,255,0.1);
      --prog-fill:    #FFD166;
      --divider-grad: linear-gradient(90deg, rgba(255,255,255,0.4), transparent);
      --empty-sub:    rgba(255,255,255,0.35);
    }

    /* ─────────────────────────────────────────
       TOP BAR — fixed 72px, dark espresso
    ───────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 72px;
      background: #1A0E06;
      border-bottom: 1px solid #C8894A;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 200;
    }
    /* Left: outlet name + sub */
    .top-brand { flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
    .top-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 700;
      color: #C8894A; line-height: 1.1;
    }
    .top-brand-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400;
      color: #9A7D6B; letter-spacing: 1.5px;
      margin-top: 2px;
    }
    /* Center: category */
    .top-category {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px; text-transform: uppercase;
      max-width: 40%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    /* Right: time + date + weather */
    .top-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .top-clock {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px; font-weight: 600;
      color: #fff;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .top-date {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400;
      color: #9A7D6B; line-height: 1;
    }
    .top-weather {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.5); line-height: 1;
    }

    /* ─────────────────────────────────────────
       PROGRESS BAR — fixed at very bottom
    ───────────────────────────────────────── */
    .progress-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 8px; background: var(--prog-bg); z-index: 200;
    }
    .progress-bar { height: 100%; width: 0%; background: var(--prog-fill); }

    /* ─────────────────────────────────────────
       SLIDE VIEWPORT — between top bar and progress bar
    ───────────────────────────────────────── */
    .slide-viewport {
      position: fixed; top: 72px; bottom: 8px;
      left: 0; right: 0;
      overflow: hidden;
      background: var(--bg);
    }

    /* ─────────────────────────────────────────
       SINGLE SLIDE CONTAINER
       Content is swapped while opacity = 0
    ───────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      opacity: 1; transform: scale(1.0);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .slide.hidden { opacity: 0; transform: scale(1.02); }

    /* ─────────────────────────────────────────
       STYLE A — List + Hero Image  (odd categories)
    ───────────────────────────────────────── */
    .slide-a {
      width: 100%; height: 100%;
      background: var(--slide-bg);
      display: flex; flex-direction: row;
      overflow: hidden;
    }
    /* Left panel: 65% */
    .slide-a-left {
      flex: 65; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }
    .slide-a-cat {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 42px; font-weight: 700;
      color: var(--cat-name-clr);
      padding: 32px 40px 12px;
      line-height: 1; flex-shrink: 0;
    }
    .slide-a-underline {
      width: 60px; height: 3px;
      background: #C8894A;
      margin: 0 0 24px 40px;
      flex-shrink: 0;
    }
    .slide-a-items {
      flex: 1; overflow: hidden;
      padding: 0 40px;
    }
    .slide-a-row {
      display: flex; align-items: center;
      height: 52px; min-height: 52px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    body.tmpl-dark .slide-a-row,
    body.tmpl-bold .slide-a-row { border-bottom-color: rgba(255,255,255,0.06); }
    .slide-a-row:last-child { border-bottom: none; }
    .slide-a-row.sold-out { opacity: 0.4; }
    .slide-a-veg {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; margin-right: 12px;
    }
    .slide-a-name-wrap {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; justify-content: center;
    }
    .slide-a-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px; font-weight: 500;
      color: var(--card-name);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .slide-a-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: var(--bar-sub);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }
    .slide-a-dots {
      flex: 1; min-width: 16px; max-width: 80px;
      border-bottom: 1px dotted rgba(200,137,74,0.35);
      margin: 0 12px; align-self: flex-end;
      margin-bottom: 13px;
    }
    .slide-a-price {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px; font-weight: 600;
      color: #C8894A; flex-shrink: 0;
    }
    /* Right panel: 35% */
    .slide-a-right {
      flex: 35; position: relative; overflow: hidden;
    }
    .slide-a-right-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .slide-a-right-illus {
      width: 100%; height: 100%;
      background: #C8894A;
      display: flex; align-items: center; justify-content: center;
    }
    .slide-a-right-illus svg {
      width: 120px; height: 120px;
      filter: brightness(0) invert(1); opacity: 0.85;
    }
    .slide-a-strip {
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: #C8894A; z-index: 1;
    }

    /* ─────────────────────────────────────────
       STYLE B — Full Screen Grid  (even categories)
    ───────────────────────────────────────── */
    .slide-b {
      width: 100%; height: 100%;
      background: var(--slide-bg);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .slide-b-header {
      padding: 20px 48px 0;
      flex-shrink: 0;
    }
    .slide-b-cat {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 38px; font-weight: 700;
      color: var(--cat-name-clr); line-height: 1;
    }
    .slide-b-underline {
      width: 60px; height: 3px;
      background: #C8894A; margin-top: 10px;
    }
    .slide-b-grid {
      flex: 1; display: grid;
      gap: 14px; padding: 16px 48px 20px;
      min-height: 0;
    }
    .slide-b-grid.layout-2  { grid-template-columns: repeat(2,1fr); grid-template-rows: 1fr; }
    .slide-b-grid.layout-34 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(2,1fr); }
    .slide-b-grid.layout-56 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(3,1fr); }
    .slide-b-grid.layout-79 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }

    /* Grid card */
    .grid-card {
      background: var(--card-bg);
      border-radius: 16px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 0;
    }
    .grid-card.sold-out { opacity: 0.4; }
    .grid-card-img {
      position: relative; overflow: hidden; flex-shrink: 0;
      background: #F0E6D3;
      display: flex; align-items: center; justify-content: center;
    }
    .grid-card-img img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .grid-card-img .food-svg { width: 70px; height: 70px; }
    .grid-card-img .food-svg svg { width: 100%; height: 100%; }
    .layout-2  .grid-card-img { height: 200px; }
    .layout-34 .grid-card-img { height: 160px; }
    .layout-56 .grid-card-img { height: 130px; }
    .layout-79 .grid-card-img { height: 110px; }
    .grid-veg-dot {
      position: absolute; top: 8px; left: 8px;
      width: 10px; height: 10px; border-radius: 2px;
    }
    .grid-popular {
      position: absolute; top: 8px; right: 8px;
      background: #C8894A; color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
    }
    .grid-sold-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: #fff; letter-spacing: 2px; text-transform: uppercase;
    }
    .grid-card-info {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      padding: 10px 14px; min-height: 0;
    }
    .grid-card-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700; line-height: 1.2; color: var(--card-name);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .grid-card-price {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600; color: var(--card-price);
      margin-top: 4px;
    }
    .layout-2  .grid-card-info  { padding: 14px 18px; }
    .layout-2  .grid-card-name  { font-size: 28px; }
    .layout-2  .grid-card-price { font-size: 24px; }
    .layout-34 .grid-card-name  { font-size: 20px; }
    .layout-34 .grid-card-price { font-size: 18px; }
    .layout-56 .grid-card-name  { font-size: 17px; }
    .layout-56 .grid-card-price { font-size: 15px; }
    .layout-79 .grid-card-name  { font-size: 14px; }
    .layout-79 .grid-card-price { font-size: 13px; }

    /* ─────────────────────────────────────────
       OFFER SLIDE
    ───────────────────────────────────────── */
    .offer-slide {
      width: 100%; height: 100%;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #2C1A0E 0%, #6B3F1F 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 120px;
    }
    .offer-circle {
      position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(200,137,74,0.12);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .offer-slide > * { position: relative; z-index: 1; }
    .offer-pill {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; color: #C8894A;
      border: 1px solid #C8894A;
      padding: 6px 16px; border-radius: 20px;
    }
    .offer-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 72px; font-weight: 700; color: #fff;
      line-height: 1.1; max-width: 800px;
      margin-top: 24px;
    }
    .offer-line {
      width: 80px; height: 3px;
      background: #C8894A;
      margin: 24px auto;
    }
    .offer-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px; font-weight: 400;
      color: #9A7D6B; line-height: 1.5;
    }
    .offer-footer {
      margin-top: 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.2);
    }

    /* ─────────────────────────────────────────
       LOADING / EMPTY STATE
    ───────────────────────────────────────── */
    .empty-slide {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .empty-logo { font-size: 64px; font-weight: 800; color: #C8894A; letter-spacing: 2px; }
    .empty-sub  { font-size: 18px; color: var(--empty-sub, rgba(255,255,255,0.25)); font-weight: 500; }

    /* ─────────────────────────────────────────
       MUSIC VISUALIZER — fixed bottom-left
    ───────────────────────────────────────── */
    .viz {
      display: flex; gap: 3px; align-items: flex-end;
      height: 20px; opacity: 0.5;
      position: fixed; bottom: 16px; left: 48px; z-index: 100;
    }
    .viz-bar { width: 4px; background: #C8894A; border-radius: 2px; }
    .viz-bar:nth-child(1) { animation: vizAnim 0.6s ease-in-out infinite alternate; }
    .viz-bar:nth-child(2) { animation: vizAnim 0.4s ease-in-out infinite alternate; }
    .viz-bar:nth-child(3) { animation: vizAnim 0.8s ease-in-out infinite alternate; }
    .viz-bar:nth-child(4) { animation: vizAnim 0.5s ease-in-out infinite alternate; }
    .viz-bar:nth-child(5) { animation: vizAnim 0.7s ease-in-out infinite alternate; }
    @keyframes vizAnim { from { height: 4px; } to { height: 20px; } }
  </style>
</head>
<body class="tmpl-dark">

<!-- ── Top bar ── -->
<div class="top-bar">
  <div class="top-brand">
    <div class="top-logo" id="displayLogo">Kapi Coast</div>
    <div class="top-brand-sub" id="displaySub">Est. 2024 · Chennai</div>
  </div>
  <div class="top-category" id="topCategory"></div>
  <div class="top-right">
    <div class="top-clock" id="clock"></div>
    <div class="top-date" id="clockDate"></div>
    <div id="weatherWidget" style="font-size:13px;color:#9A7D6B;margin-top:2px;"></div>
  </div>
</div>

<!-- ── Slide viewport ── -->
<div class="slide-viewport">
  <div class="slide" id="slide">
    <div class="empty-slide">
      <div class="empty-logo">KAPI COAST</div>
      <div class="empty-sub">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Progress bar ── -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- ── Music visualizer ── -->
<div class="viz">
  <div class="viz-bar"></div>
  <div class="viz-bar"></div>
  <div class="viz-bar"></div>
  <div class="viz-bar"></div>
  <div class="viz-bar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Outlet from URL — must be first ──
const urlParams = new URLSearchParams(window.location.search);
const outlet    = urlParams.get("outlet") || "ecr";
console.log("Display outlet:", outlet);

// ── Fetch and show outlet name/logo in header ──
getDoc(doc(db, "outlets", outlet)).then(snap => {
  const d = snap.exists() ? snap.data() : {};
  const brandEl = document.getElementById("displayLogo");
  if (d.logoUrl) {
    brandEl.innerHTML =
      `<img src="${d.logoUrl.replace(/"/g,"&quot;")}" height="40" style="border-radius:6px;object-fit:contain;display:block;">`;
  } else {
    brandEl.textContent = d.name || outlet;
  }
});

// ── Clock + Date ──
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true });
  document.getElementById("clockDate").textContent =
    now.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" });
}
updateClock();
setInterval(updateClock, 1000);

// ── Weather: Open-Meteo (Chennai, no API key needed) ──
async function fetchWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=13.0827&longitude=80.2707&current=temperature_2m,weathercode&timezone=Asia/Kolkata");
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    const emoji = code === 0 ? "☀" : code <= 3 ? "⛅" : code <= 67 ? "🌧" : code <= 77 ? "❄" : "⛈";
    const el = document.getElementById("weatherWidget");
    if (el) el.textContent = emoji + " " + temp + "°C";
  } catch(e) { console.log("Weather unavailable"); }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ── Helpers ──
function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function getFoodIllustration(category, name) {
  const c = (category || "").toLowerCase();
  const n = (name || "").toLowerCase();
  const illustrations = {
    coffee: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><ellipse cx="40" cy="52" rx="20" ry="14" fill="#C8894A" opacity=".3"/><rect x="22" y="36" width="32" height="24" rx="6" fill="#C8894A"/><rect x="54" y="42" width="10" height="12" rx="5" fill="none" stroke="#C8894A" stroke-width="2.5"/><path d="M30 36 Q32 26 36 24 Q40 22 44 24 Q48 26 50 36" fill="#7B4F2E" opacity=".5"/><ellipse cx="40" cy="36" rx="16" ry="4" fill="#FAF6F0" opacity=".6"/></svg>`,
    tea: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><rect x="20" y="34" width="32" height="26" rx="6" fill="#9A7D6B"/><rect x="52" y="40" width="10" height="12" rx="5" fill="none" stroke="#9A7D6B" stroke-width="2.5"/><path d="M26 34 Q28 22 36 20 Q44 18 46 34" fill="#7B4F2E" opacity=".4"/><path d="M30 26 Q32 20 34 24" stroke="#C8894A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M37 24 Q39 18 41 22" stroke="#C8894A" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`,
    snack: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><rect x="16" y="38" width="48" height="24" rx="8" fill="#C8894A"/><rect x="20" y="30" width="40" height="14" rx="6" fill="#E8A96A"/><circle cx="28" cy="37" r="3" fill="#FAF6F0" opacity=".5"/><circle cx="40" cy="35" r="3" fill="#FAF6F0" opacity=".5"/><circle cx="52" cy="37" r="3" fill="#FAF6F0" opacity=".5"/></svg>`,
    food: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><ellipse cx="40" cy="48" rx="26" ry="14" fill="#C8894A" opacity=".3"/><rect x="14" y="38" width="52" height="18" rx="9" fill="#C8894A"/><rect x="18" y="34" width="44" height="10" rx="5" fill="#E8A96A"/><circle cx="40" cy="34" r="14" fill="#F0A030" opacity=".2"/><rect x="30" y="20" width="20" height="18" rx="10" fill="#E8A96A" opacity=".6"/></svg>`,
    dessert: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><ellipse cx="40" cy="54" rx="22" ry="8" fill="#C8894A" opacity=".3"/><rect x="20" y="42" width="40" height="18" rx="9" fill="#C8894A"/><path d="M24 42 Q40 24 56 42" fill="#E8A96A"/><path d="M36 26 Q38 18 40 14 Q42 18 44 26" fill="#9A7D6B" opacity=".6"/><circle cx="40" cy="14" r="4" fill="#C8894A"/></svg>`,
    juice: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><rect x="26" y="30" width="28" height="34" rx="6" fill="#F0A030" opacity=".8"/><rect x="26" y="26" width="28" height="10" rx="4" fill="#E8A96A"/><rect x="38" y="16" width="4" height="14" rx="2" fill="#9A7D6B"/><circle cx="28" cy="44" r="3" fill="#FAF6F0" opacity=".4"/><circle cx="52" cy="50" r="2" fill="#FAF6F0" opacity=".4"/></svg>`,
    "cold-drink": `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><rect x="26" y="24" width="28" height="40" rx="8" fill="#9A7D6B" opacity=".7"/><rect x="26" y="24" width="28" height="12" rx="6" fill="#C8894A"/><rect x="40" y="14" width="3" height="14" rx="1.5" fill="#2C1A0E" opacity=".5"/><circle cx="34" cy="44" r="2" fill="#FAF6F0" opacity=".5"/><circle cx="46" cy="52" r="2" fill="#FAF6F0" opacity=".5"/><circle cx="34" cy="56" r="2" fill="#FAF6F0" opacity=".5"/></svg>`,
    default: `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="80" rx="8" fill="#EDE5DB"/><circle cx="40" cy="38" r="20" fill="#C8894A" opacity=".2"/><text x="40" y="44" text-anchor="middle" font-size="28" fill="#C8894A">🍽</text></svg>`
  };
  if (c.includes("coffee") || n.includes("coffee") || n.includes("espresso") || n.includes("cappuccino") || n.includes("latte") || n.includes("brew")) return illustrations.coffee;
  if (c.includes("tea") || n.includes("tea") || n.includes("chai")) return illustrations.tea;
  if (c.includes("juice") || n.includes("juice") || n.includes("lemon") || n.includes("orange")) return illustrations.juice;
  if (c.includes("cold") || n.includes("cold") || n.includes("soda") || n.includes("cola") || n.includes("fizz")) return illustrations["cold-drink"];
  if (c.includes("dessert") || c.includes("sweet") || n.includes("cake") || n.includes("ice cream") || n.includes("pudding") || n.includes("cookie")) return illustrations.dessert;
  if (c.includes("snack") || n.includes("snack") || n.includes("chip") || n.includes("sandwich") || n.includes("toast")) return illustrations.snack;
  if (c.includes("food") || c.includes("meal") || c.includes("rice") || c.includes("curry") || n.includes("rice") || n.includes("curry")) return illustrations.food;
  return illustrations.default;
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Bold Promo: per-category gradient palette ──
const BOLD_GRADS = [
  "linear-gradient(135deg,#0F2027,#203A43,#2C5364)",
  "linear-gradient(135deg,#1a0533,#3a0d6e,#5a1fa8)",
  "linear-gradient(135deg,#0a1628,#0e2d4a,#155a8a)",
  "linear-gradient(135deg,#1a2a00,#2e5200,#3d7000)",
  "linear-gradient(135deg,#2C1A0E,#7a3d0d,#C8894A)",
  "linear-gradient(135deg,#1a0010,#4d0030,#8b0050)",
  "linear-gradient(135deg,#001a1a,#004d4d,#007878)",
];
function boldGradient(cat) {
  let h = 0;
  for (let i = 0; i < cat.length; i++) h = cat.charCodeAt(i) + ((h << 5) - h);
  return BOLD_GRADS[Math.abs(h) % BOLD_GRADS.length];
}

// ── State ──
let menuItems   = [];
let activeOffer = null;
let cfg = {
  template:        "dark",
  intervalSeconds: 10,
  hiddenCategories: [],
  maxItemsPerSlide: 9,
  showOffers:      true
};
let slides       = [];
let slideIndex   = 0;
let rotateTimer  = null;
let transitioning = false;

// ── CSS layout class by item count ──
function layoutClass(n) {
  if (n <= 2)  return "layout-2";
  if (n <= 4)  return "layout-34";
  if (n <= 6)  return "layout-56";
  return "layout-79"; // 7-9
}

// ── Build slide list from categories ──
function buildSlides() {
  slides = [];
  const { hiddenCategories = [], maxItemsPerSlide = 9, showOffers = true } = cfg;
  const cap = Math.min(maxItemsPerSlide, 9);

  // Offer goes first (index 0)
  if (showOffers && activeOffer) slides.push({ type: "offer", data: activeOffer });

  const catMap = {};
  menuItems.forEach(item => {
    const cat = (item.category || "Others").trim();
    if (hiddenCategories.includes(cat)) return;
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(item);
  });

  // Alternate Style A (odd slides: 1,3,5…) and Style B (even slides: 2,4,6…)
  let catIndex = 0;
  Object.keys(catMap).sort().forEach(cat => {
    const items     = catMap[cat];
    const pageCount = Math.ceil(items.length / cap);
    for (let p = 0; p < pageCount; p++) {
      slides.push({
        type: "category", category: cat,
        items: items.slice(p * cap, (p + 1) * cap),
        style: catIndex % 2 === 0 ? "A" : "B"
      });
    }
    catIndex++;
  });
}

// ── HTML: Style A — List + Hero Image ──
function styleASlideHTML(slide) {
  const { category, items } = slide;
  const shown    = items.slice(0, 8);
  const heroItem = items.find(i => i.imageUrl) || null;
  const bgAttr   = cfg.template === "bold"
    ? ` style="background:${boldGradient(category)};"` : "";

  const rightPanel = heroItem
    ? `<img class="slide-a-right-img" src="${esc(heroItem.imageUrl)}" alt="${esc(heroItem.name)}" loading="lazy">`
    : `<div class="slide-a-right-illus">${getFoodIllustration(category, items[0]?.name || "")}</div>`;

  const rows = shown.map(item => {
    const out = item.available === false || item.soldOut === true;
    const vegDot = item.veg === "veg"
      ? `<span class="slide-a-veg" style="background:#22C55E;"></span>`
      : item.veg === "nonveg"
      ? `<span class="slide-a-veg" style="background:#EF4444;"></span>`
      : `<span style="width:22px;flex-shrink:0;"></span>`;
    const desc = item.description
      ? `<div class="slide-a-desc">${esc(item.description)}</div>` : "";
    return `<div class="slide-a-row${out ? " sold-out" : ""}">
      ${vegDot}
      <div class="slide-a-name-wrap">
        <div class="slide-a-name">${esc(item.name)}</div>
        ${desc}
      </div>
      <div class="slide-a-dots"></div>
      <div class="slide-a-price">₹${esc(item.price)}</div>
    </div>`;
  }).join("");

  return `<div class="slide-a"${bgAttr}>
    <div class="slide-a-left">
      <div class="slide-a-cat">${esc(category)}</div>
      <div class="slide-a-underline"></div>
      <div class="slide-a-items">${rows}</div>
    </div>
    <div class="slide-a-right">
      <div class="slide-a-strip"></div>
      ${rightPanel}
    </div>
  </div>`;
}

// ── HTML: grid card (Style B) ──
function gridCardHTML(item) {
  const out     = item.available === false || item.soldOut === true;
  const vegDot  = item.veg === "veg"
    ? `<span class="grid-veg-dot" style="background:#22C55E;"></span>`
    : item.veg === "nonveg"
    ? `<span class="grid-veg-dot" style="background:#EF4444;"></span>` : "";
  const popular = item.popular ? `<span class="grid-popular">★ Popular</span>` : "";
  const img = item.imageUrl
    ? `<img src="${esc(item.imageUrl)}" alt="${esc(item.name)}" loading="lazy">`
    : `<div class="food-svg">${getFoodIllustration(item.category, item.name)}</div>`;
  return `<div class="grid-card${out ? " sold-out" : ""}">
    <div class="grid-card-img">
      ${img}${vegDot}${popular}${out ? '<div class="grid-sold-overlay">Sold Out</div>' : ""}
    </div>
    <div class="grid-card-info">
      <div class="grid-card-name">${esc(item.name)}</div>
      <div class="grid-card-price">₹${esc(item.price)}</div>
    </div>
  </div>`;
}

// ── HTML: Style B — Full Screen Grid ──
function styleBSlideHTML(slide) {
  const { category, items } = slide;
  const layout = layoutClass(items.length);
  const bgAttr = cfg.template === "bold"
    ? ` style="background:${boldGradient(category)};"` : "";
  return `<div class="slide-b"${bgAttr}>
    <div class="slide-b-header">
      <div class="slide-b-cat">${esc(category)}</div>
      <div class="slide-b-underline"></div>
    </div>
    <div class="slide-b-grid ${layout}">
      ${items.map(gridCardHTML).join("")}
    </div>
  </div>`;
}

// ── HTML: category slide — dispatch by assigned style ──
function catSlideHTML(slide) {
  if (slide.style === "B" && slide.items.length > 1) return styleBSlideHTML(slide);
  return styleASlideHTML(slide); // Style A handles all counts including 1
}

// ── HTML: offer slide ──
function offerHTML(d) {
  const outletName = document.getElementById("displayLogo").textContent || "Kapi Coast";
  return `<div class="offer-slide">
    <div class="offer-circle"></div>
    <span class="offer-pill">Today's Special</span>
    <div class="offer-title">${esc(d.title)}</div>
    <div class="offer-line"></div>
    <div class="offer-body">${esc(d.body)}</div>
    <div class="offer-footer">${esc(outletName)}</div>
  </div>`;
}

function makeSlideHTML(slide) {
  if (!slide) return emptyHTML("No content");
  if (slide.type === "offer")    return offerHTML(slide.data);
  if (slide.type === "category") return catSlideHTML(slide);
  return emptyHTML("No content");
}
function emptyHTML(msg) {
  return `<div class="empty-slide">
    <div class="empty-logo">KAPI COAST</div>
    <div class="empty-sub">${esc(msg)}</div>
  </div>`;
}

// ── Progress bar ──
function startProgress() {
  const bar = document.getElementById("progressBar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  bar.offsetWidth; // force reflow
  bar.style.transition = `width ${cfg.intervalSeconds}s linear`;
  bar.style.width = "100%";
}

// ── Update top bar category label ──
function updateTopLabel(slide) {
  document.getElementById("topCategory").textContent =
    !slide ? "" : slide.type === "offer" ? "Today's Offer" : slide.category;
}

// ── Transition: fade out → swap content → fade in ──
async function transitionTo(idx) {
  if (transitioning) return;
  transitioning = true;

  const slideEl = document.getElementById("slide");
  slideEl.classList.add("hidden");
  await sleep(620); // match 0.6s CSS transition

  const slide = slides[idx];
  slideEl.innerHTML = slides.length
    ? makeSlideHTML(slide)
    : emptyHTML("No menu items yet");

  updateTopLabel(slide || null);
  slideEl.classList.remove("hidden");
  startProgress();
  transitioning = false;
}

// ── Auto-rotation ──
function startRotation() {
  clearInterval(rotateTimer);
  slideIndex = 0;
  if (!slides.length) {
    document.getElementById("slide").innerHTML = emptyHTML("No menu items yet");
    return;
  }
  transitionTo(0);
  rotateTimer = setInterval(async () => {
    slideIndex = (slideIndex + 1) % slides.length;
    await transitionTo(slideIndex);
  }, cfg.intervalSeconds * 1000);
}

function rebuild() {
  buildSlides();
  clearInterval(rotateTimer);
  startRotation();
}

// ── Live: menu items ──
onSnapshot(collection(db, "outlets", outlet, "menu"), snap => {
  menuItems = [];
  snap.forEach(d => {
    const item = { ...d.data(), id: d.id };
    if (item.archived === true) return;
    item.category = (item.category || "Others").trim();
    menuItems.push(item);
  });
  menuItems.sort((a, b) =>
    a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  rebuild();
});

// ── Live: active offer ──
onSnapshot(query(collection(db, "outlets", outlet, "ads"), where("active", "==", true)), snap => {
  activeOffer = snap.empty ? null : snap.docs[0].data();
  rebuild();
});

// ── Live: display settings — instant template switch + rebuild ──
onSnapshot(doc(db, "outlets", outlet, "settings", "display"), snap => {
  if (!snap.exists()) return;
  const d = snap.data();
  cfg = {
    template:         d.template         || "dark",
    intervalSeconds:  d.intervalSeconds  || 10,
    hiddenCategories: d.hiddenCategories || [],
    maxItemsPerSlide: d.maxItemsPerSlide || 6,
    showOffers:       d.showOffers !== false
  };
  // Apply template class immediately (CSS variable switch — no reload needed)
  document.body.className = "tmpl-" + cfg.template;
  rebuild();
});
</script>
