<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapi Coast Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0D0D;
      color: #fff;
      font-family: 'Manrope', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(0,0,0,0.5);
      flex-shrink: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(200,137,74,0.15);
    }
    .top-logo  { font-size: 30px; font-weight: 800; color: #C8894A; letter-spacing: 0.5px; }
    .top-handle { font-size: 18px; font-weight: 600; color: #9A7D6B; letter-spacing: 0.3px; }
    .top-clock  { font-size: 28px; font-weight: 700; color: #FAF6F0; font-variant-numeric: tabular-nums; min-width: 160px; text-align: right; }

    /* ── Slide area ── */
    .slide-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Generic slide ── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    .slide.visible { opacity: 1; }

    /* ── Offer slide ── */
    .offer-slide {
      flex-direction: column;
      text-align: center;
      padding: 60px;
      background: linear-gradient(135deg, #2C1A0E 0%, #1a0e07 100%);
    }
    .offer-badge {
      display: inline-block;
      font-size: 13px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: #C8894A;
      background: rgba(200,137,74,0.12);
      border: 1px solid rgba(200,137,74,0.3);
      padding: 7px 24px; border-radius: 24px;
      margin-bottom: 36px;
    }
    .offer-title {
      font-size: 80px; font-weight: 800; color: #C8894A;
      line-height: 1.05; margin-bottom: 28px; letter-spacing: -1.5px;
      max-width: 1100px;
    }
    .offer-body {
      font-size: 38px; font-weight: 500; color: #FAF6F0;
      opacity: 0.88; line-height: 1.45; max-width: 860px;
    }

    /* ── Menu item slide ── */
    .item-slide { position: relative; overflow: hidden; }
    .item-slide-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(6px) brightness(0.28);
      transform: scale(1.08);
    }
    .item-slide-content {
      position: relative; z-index: 2;
      display: flex;
      align-items: center;
      gap: 80px;
      padding: 60px 100px;
      width: 100%;
      max-width: 1500px;
    }
    .item-img {
      width: 460px; height: 460px;
      border-radius: 28px; object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 32px 80px rgba(0,0,0,0.65);
    }
    .item-info { flex: 1; }
    .item-cat-label {
      font-size: 15px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: #C8894A;
      margin-bottom: 18px;
    }
    .item-name {
      font-size: 76px; font-weight: 800; color: #fff;
      line-height: 1.05; margin-bottom: 22px; letter-spacing: -1.5px;
    }
    .item-desc {
      font-size: 24px; font-weight: 400; color: rgba(255,255,255,0.65);
      line-height: 1.55; margin-bottom: 36px; max-width: 520px;
    }
    .item-price { font-size: 54px; font-weight: 800; color: #C8894A; }

    /* ── Progress bar ── */
    .progress-wrap {
      height: 5px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #C8894A, #e8a963);
      width: 0%;
    }

    /* ── Empty / loading state ── */
    .empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .empty-logo { font-size: 72px; font-weight: 800; color: #C8894A; }
    .empty-sub  { font-size: 22px; color: #9A7D6B; font-weight: 500; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="top-bar">
  <div class="top-logo">Kapi Coast</div>
  <div class="top-handle">@kapicoast</div>
  <div class="top-clock" id="clock"></div>
</div>

<!-- ── Slide area ── -->
<div class="slide-area" id="slideArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-logo">Kapi Coast</div>
    <div class="empty-sub">Loading menu…</div>
  </div>
</div>

<!-- ── Progress bar ── -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, doc, onSnapshot, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Clock ──
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-IN", {
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true
    });
}
updateClock();
setInterval(updateClock, 1000);

// ── State ──
let menuItems   = [];
let activeOffer = null;
let intervalSec = 7;
let slides      = [];
let slideIndex  = 0;
let rotateTimer = null;

function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ── Build slides list ──
function buildSlides() {
  slides = [];
  if (activeOffer) slides.push({ type: "offer", data: activeOffer });
  menuItems.forEach(item => slides.push({ type: "item", data: item }));
}

// ── Create slide DOM element ──
function makeSlideEl(slide) {
  const el = document.createElement("div");
  el.className = "slide";

  if (slide.type === "offer") {
    const d = slide.data;
    el.classList.add("offer-slide");
    el.innerHTML = `
      <span class="offer-badge">Today's Offer</span>
      <div class="offer-title">${esc(d.title)}</div>
      <div class="offer-body">${esc(d.body)}</div>`;
  } else {
    const d = slide.data;
    el.classList.add("item-slide");
    el.innerHTML = `
      <div class="item-slide-bg" style="background-image:url('${esc(d.imageUrl || "")}')"></div>
      <div class="item-slide-content">
        <img class="item-img" src="${esc(d.imageUrl || "")}" alt="${esc(d.name)}">
        <div class="item-info">
          <div class="item-cat-label">${esc(d.category)}</div>
          <div class="item-name">${esc(d.name)}</div>
          <div class="item-desc">${esc(d.description || "")}</div>
          <div class="item-price">Rs. ${esc(d.price)}</div>
        </div>
      </div>`;
  }
  return el;
}

// ── Show slide at index ──
function showSlide(idx) {
  const area  = document.getElementById("slideArea");
  const empty = document.getElementById("emptyState");

  if (!slides.length) {
    empty.style.display = "flex";
    area.querySelectorAll(".slide").forEach(e => e.remove());
    return;
  }
  empty.style.display = "none";

  // Fade out old slide
  const prev = area.querySelector(".slide.visible");
  if (prev) {
    prev.classList.remove("visible");
    setTimeout(() => prev.remove(), 850);
  }

  const el = makeSlideEl(slides[idx]);
  area.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("visible")));
}

// ── Animate progress bar ──
function animateProgress() {
  const bar = document.getElementById("progressBar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  bar.offsetWidth; // force reflow
  bar.style.transition = `width ${intervalSec}s linear`;
  bar.style.width = "100%";
}

// ── Start / restart auto-rotation ──
function startRotation() {
  clearInterval(rotateTimer);
  if (!slides.length) { showSlide(0); return; }

  slideIndex = Math.min(slideIndex, slides.length - 1);
  showSlide(slideIndex);
  animateProgress();

  rotateTimer = setInterval(() => {
    slideIndex = (slideIndex + 1) % slides.length;
    showSlide(slideIndex);
    animateProgress();
  }, intervalSec * 1000);
}

function rebuild() {
  buildSlides();
  slideIndex = 0;
  startRotation();
}

// ── Live: menu ──
onSnapshot(collection(db, "menu"), snap => {
  menuItems = [];
  snap.forEach(d => {
    const item = { ...d.data(), id: d.id };
    if (item.available === false || item.visible === false) return;
    item.category = (item.category || "Others").trim();
    menuItems.push(item);
  });
  menuItems.sort((a, b) =>
    a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  rebuild();
});

// ── Live: active ad ──
onSnapshot(query(collection(db, "ads"), where("active", "==", true)), snap => {
  activeOffer = snap.empty ? null : snap.docs[0].data();
  rebuild();
});

// ── Live: display settings ──
onSnapshot(doc(db, "settings", "display"), snap => {
  if (snap.exists()) {
    const secs = snap.data().intervalSeconds;
    if (secs && secs !== intervalSec) {
      intervalSec = secs;
      rebuild();
    }
  }
});
</script>

</body>
</html>
