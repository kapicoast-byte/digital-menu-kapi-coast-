<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapi Coast Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0D;
      font-family: 'Manrope', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #fff;
    }

    /* ─────────────────────────────────────────
       TOP BAR — always on top, never part of a slide
    ───────────────────────────────────────── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: #1A1A1A;
      border-bottom: 1px solid #C8894A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 200;
    }
    .top-logo {
      font-size: 22px;
      font-weight: 800;
      color: #C8894A;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .top-handle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
    }
    .top-clock {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    /* ─────────────────────────────────────────
       PROGRESS BAR — fixed at very bottom
    ───────────────────────────────────────── */
    .progress-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.07);
      z-index: 200;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #C8894A;
    }

    /* ─────────────────────────────────────────
       SLIDE VIEWPORT — sits between top bar and progress bar
    ───────────────────────────────────────── */
    .slide-viewport {
      position: fixed;
      top: 64px;
      bottom: 4px;
      left: 0; right: 0;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       SINGLE SLIDE CONTAINER
       Content is swapped while opacity = 0
    ───────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      opacity: 1;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }
    .slide.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       OFFER SLIDE
    ───────────────────────────────────────── */
    .offer-slide {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1A0E06 0%, #2C1A0E 60%, #1A0E06 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 120px;
    }
    .offer-pill {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C8894A;
      border: 1px solid rgba(200,137,74,0.4);
      padding: 7px 28px;
      border-radius: 32px;
      margin-bottom: 40px;
    }
    .offer-deco {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C8894A, transparent);
      margin: 0 auto 32px;
    }
    .offer-deco.below { margin: 32px auto 40px; }
    .offer-title {
      font-size: 72px;
      font-weight: 800;
      color: #fff;
      line-height: 1.08;
      letter-spacing: -1px;
      max-width: 900px;
      margin-bottom: 0;
    }
    .offer-body {
      font-size: 32px;
      font-weight: 500;
      color: #C8894A;
      line-height: 1.5;
      max-width: 760px;
    }
    .offer-footer {
      margin-top: 48px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────
       MENU ITEM SLIDE — clean split layout
       Left half: image only, no text overlay
       Right half: dark bg, text only
    ───────────────────────────────────────── */
    .item-slide {
      width: 100%; height: 100%;
      display: flex;
    }
    .item-img-half {
      width: 50%;
      height: 100%;
      flex-shrink: 0;
      overflow: hidden;
    }
    .item-img-half img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .item-text-half {
      flex: 1;
      background: #111111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 72px;
    }
    .item-category {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C8894A;
      margin-bottom: 24px;
    }
    .item-name {
      font-size: 64px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 28px;
    }
    .item-divider {
      width: 60px;
      height: 3px;
      background: #C8894A;
      margin-bottom: 28px;
      border-radius: 2px;
    }
    .item-price {
      font-size: 48px;
      font-weight: 800;
      color: #C8894A;
      margin-bottom: 24px;
    }
    .item-desc {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      max-width: 420px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       LOADING / EMPTY STATE
    ───────────────────────────────────────── */
    .empty-slide {
      width: 100%; height: 100%;
      background: #0D0D0D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .empty-logo { font-size: 64px; font-weight: 800; color: #C8894A; letter-spacing: 2px; }
    .empty-sub  { font-size: 18px; color: rgba(255,255,255,0.25); font-weight: 500; }
  </style>
</head>
<body>

<!-- ── Top bar (always visible) ── -->
<div class="top-bar">
  <div class="top-logo">Kapi Coast</div>
  <div class="top-handle">@kapicoast</div>
  <div class="top-clock" id="clock"></div>
</div>

<!-- ── Slide viewport ── -->
<div class="slide-viewport">
  <div class="slide" id="slide">
    <!-- content injected by JS -->
    <div class="empty-slide">
      <div class="empty-logo">KAPI COAST</div>
      <div class="empty-sub">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Progress bar (always visible) ── -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, doc, onSnapshot, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Clock ──
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-IN", {
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true
    });
}
updateClock();
setInterval(updateClock, 1000);

// ── Helpers ──
function esc(v) {
  return String(v ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── State ──
let menuItems    = [];
let activeOffer  = null;
let intervalSec  = 7;
let slides       = [];
let slideIndex   = 0;
let rotateTimer  = null;
let transitioning = false;

// ── Build slide list ──
function buildSlides() {
  slides = [];
  if (activeOffer) slides.push({ type: "offer", data: activeOffer });
  menuItems.forEach(item => slides.push({ type: "item", data: item }));
}

// ── Generate inner HTML for a slide ──
function makeSlideHTML(slide) {
  if (!slide) {
    return `<div class="empty-slide">
      <div class="empty-logo">KAPI COAST</div>
      <div class="empty-sub">No content</div>
    </div>`;
  }

  if (slide.type === "offer") {
    const d = slide.data;
    return `<div class="offer-slide">
      <span class="offer-pill">Today's Offer</span>
      <div class="offer-deco"></div>
      <div class="offer-title">${esc(d.title)}</div>
      <div class="offer-deco below"></div>
      <div class="offer-body">${esc(d.body)}</div>
      <div class="offer-footer">kapicoast.org</div>
    </div>`;
  }

  // item slide — clean split, text NEVER on top of image
  const d = slide.data;
  return `<div class="item-slide">
    <div class="item-img-half">
      <img src="${esc(d.imageUrl || "")}" alt="${esc(d.name)}">
    </div>
    <div class="item-text-half">
      <div class="item-category">${esc(d.category)}</div>
      <div class="item-name">${esc(d.name)}</div>
      <div class="item-divider"></div>
      <div class="item-price">Rs. ${esc(d.price)}</div>
      <div class="item-desc">${esc(d.description || "")}</div>
    </div>
  </div>`;
}

// ── Progress bar ──
function startProgress() {
  const bar = document.getElementById("progressBar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  bar.offsetWidth; // force reflow
  bar.style.transition = `width ${intervalSec}s linear`;
  bar.style.width = "100%";
}

// ── Transition to a slide: fade out → swap content → fade in ──
// This is the key fix: content is swapped only while opacity = 0,
// so two slides are NEVER visible at the same time.
async function transitionTo(idx) {
  if (transitioning) return;
  transitioning = true;

  const slideEl = document.getElementById("slide");

  // 1. Fade out
  slideEl.classList.add("hidden");
  await sleep(720); // match CSS transition duration

  // 2. Swap content while invisible
  slideEl.innerHTML = slides.length
    ? makeSlideHTML(slides[idx])
    : `<div class="empty-slide"><div class="empty-logo">KAPI COAST</div><div class="empty-sub">No menu items</div></div>`;

  // 3. Fade in
  slideEl.classList.remove("hidden");

  // 4. Start progress bar for this slide
  startProgress();

  transitioning = false;
}

// ── Auto-rotation ──
function startRotation() {
  clearInterval(rotateTimer);
  if (!slides.length) {
    transitionTo(0);
    return;
  }
  slideIndex = 0;
  transitionTo(slideIndex);

  rotateTimer = setInterval(async () => {
    slideIndex = (slideIndex + 1) % slides.length;
    await transitionTo(slideIndex);
  }, intervalSec * 1000);
}

function rebuild() {
  buildSlides();
  clearInterval(rotateTimer);
  startRotation();
}

// ── Live: menu ──
onSnapshot(collection(db, "menu"), snap => {
  menuItems = [];
  snap.forEach(d => {
    const item = { ...d.data(), id: d.id };
    if (item.available === false || item.visible === false) return;
    item.category = (item.category || "Others").trim();
    menuItems.push(item);
  });
  menuItems.sort((a, b) =>
    a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  rebuild();
});

// ── Live: active offer ──
onSnapshot(query(collection(db, "ads"), where("active", "==", true)), snap => {
  activeOffer = snap.empty ? null : snap.docs[0].data();
  rebuild();
});

// ── Live: display settings ──
onSnapshot(doc(db, "settings", "display"), snap => {
  if (snap.exists()) {
    const secs = snap.data().intervalSeconds;
    if (secs && secs !== intervalSec) {
      intervalSec = secs;
      rebuild();
    }
  }
});
</script>

</body>
</html>
