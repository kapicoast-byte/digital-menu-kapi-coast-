<!DOCTYPE html>
<html>
<head>
  <title>Kapi Coast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f5f5f5; margin:0;">

<h2 style="background:black; color:white; padding:15px; text-align:center;">
  Kapi Coast Menu
</h2>

<div id="adBanner" style="display:none; margin:10px; padding:16px; border-radius:10px;"></div>
<div id="offerBanner" style="display:none; margin:10px; padding:12px; background:#fff3cd; border-radius:10px; color:#5c4400;"></div>
<div id="menu" style="padding:10px;">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_gtI05K2B7GUEslsMjU_pN4B7rV8kkbM",
  authDomain: "pspk-c5298.firebaseapp.com",
  projectId: "pspk-c5298",
  storageBucket: "pspk-c5298.firebasestorage.app",
  messagingSenderId: "426256600838",
  appId: "1:426256600838:web:e8f5b8f4be326d482c5887",
  measurementId: "G-YSBZE6JDTY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[char]));
}

async function loadOffer() {
  const offerBanner = document.getElementById("offerBanner");
  const offerDoc = await getDoc(doc(db, "settings", "offer"));

  if (!offerDoc.exists()) {
    return;
  }

  const message = (offerDoc.data().message || "").trim();
  if (!message) {
    return;
  }

  offerBanner.textContent = message;
  offerBanner.style.display = "block";
}

async function loadMenu() {
  const menuDiv = document.getElementById("menu");

  try {
    const snapshot = await getDocs(collection(db, "menu"));
    const categories = {};
    let html = "";

    snapshot.forEach(docSnap => {
      const item = docSnap.data();
      const cat = (item.category || "Others").trim();

      if (!categories[cat]) categories[cat] = [];
      categories[cat].push(item);
    });

    Object.keys(categories).forEach(cat => {
      html += `<h3 style="margin:10px;">${escapeHtml(cat)}</h3>`;

      categories[cat].forEach(item => {
        html += `
          <div style="display:flex; gap:10px; background:white; padding:10px; margin:10px; border-radius:10px;">
            <img src="${item.imageUrl || ""}"
                 alt="${escapeHtml(item.name)}"
                 style="width:70px; height:70px; border-radius:8px; object-fit:cover; background:#e5e5e5;">

            <div>
              <h4>${escapeHtml(item.name)}</h4>
              <p>${escapeHtml(item.description || "")}</p>
              <b>Rs. ${escapeHtml(item.price)}</b>
            </div>
          </div>
        `;
      });
    });

    menuDiv.innerHTML = html || "No items found";
  } catch (err) {
    console.error(err);
    menuDiv.innerHTML = "Error loading menu";
  }
}

function listenForActiveAd() {
  const adBanner = document.getElementById("adBanner");
  const q = query(collection(db, "ads"), where("active", "==", true));

  onSnapshot(q, snapshot => {
    if (snapshot.empty) {
      adBanner.style.display = "none";
      adBanner.innerHTML = "";
      return;
    }

    const ad = snapshot.docs[0].data();
    adBanner.style.background = ad.color || "#fff3cd";
    adBanner.innerHTML =
      `<div style="font-weight:bold; font-size:15px; margin-bottom:4px;">${escapeHtml(ad.title)}</div>` +
      `<div style="font-size:14px;">${escapeHtml(ad.body)}</div>`;
    adBanner.style.display = "block";
  });
}

await loadOffer();
await loadMenu();
listenForActiveAd();
</script>

</body>
</html>
